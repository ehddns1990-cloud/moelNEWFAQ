// state 전역 상태 (visibleLimit 도입)
var state = { query:'', category:'전체', mode:'all', sort:'relevance', expanded:false, visibleLimit:25 };
var popularTerms = ['휴가는 어떻게 신청하나요?', '반일연가는 어떻게 계산하나요?', '초과근무수당 단가는 어디를 봐야 하나요?', '출장은 어디에서 신청하나요?', '정보공개청구는 며칠 안에 결정해야 하나요?', '급여명세서는 어디서 확인하나요?'];

function esc(v){
  var str = (v === null || v === undefined) ? '' : String(v);
  return str.replace(/[&<>"']/g, function(ch) {
    var map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
    return map[ch];
  });
}

function plain(v){
  var str = (v === null || v === undefined) ? '' : String(v);
  return str.replace(/\s+/g,' ').trim();
}

function norm(v){
  return plain(v).toLowerCase();
}

// 🛡️ 1. RegExp 0% 전면 퇴출 및 순수 문자열 인덱싱 기반 하이라이팅 처리 엔진
function highlight(text, query){
  var raw = plain(text);
  if(!query) return esc(raw);
  var words = query.split(/\s+/).map(norm).filter(Boolean).slice(0,5);
  if(!words.length) return esc(raw);

  var rawNorm = norm(raw);
  var marked = new Array(raw.length);
  for(var i = 0; i < marked.length; i++) {
    marked[i] = false;
  }

  for(var i = 0; i < words.length; i++){
    var w = words[i];
    if(!w) continue;
    var pos = 0;
    while(true){
      var idx = rawNorm.indexOf(w, pos);
      if(idx === -1) break;
      for(var k = 0; k < w.length; k++){
        marked[idx + k] = true;
      }
      pos = idx + 1; // 겹치는 매칭 허용 및 무한루프 완벽 방지
    }
  }

  var html = [];
  var inMark = false;
  for(var i = 0; i < raw.length; i++){
    var charHtml = esc(raw.charAt(i));
    if(marked[i]){
      if(!inMark){
        html.push('<mark>');
        inMark = true;
      }
      html.push(charHtml);
    } else {
      if(inMark){
        html.push('</mark>');
        inMark = false;
      }
      html.push(charHtml);
    }
  }
  if(inMark){
    html.push('</mark>');
  }
  return html.join('');
}

function cats(){
  var arr = ['전체'];
  for(var i = 0; i < FAQ_DATA.length; i++){
    var cat = FAQ_DATA[i].cat;
    if(cat && arr.indexOf(cat) === -1){
      arr.push(cat);
    }
  }
  return arr;
}

function haystack(item, mode){
  if(mode==='question') return item.q;
  if(mode==='answer') return item.a;
  var kws = item.kw || [];
  var arr = [item.q, item.a];
  for(var i = 0; i < kws.length; i++){
    arr.push(kws[i]);
  }
  return arr.join(' ');
}

function score(item, words){
  if(!words.length) return 0;
  var q = norm(item.q);
  var a = norm(item.a);
  var s = norm(item.source);
  var kw = norm((item.kw || []).join(' '));
  var n = 0;
  for(var i = 0; i < words.length; i++){
    var w = words[i];
    if(q.indexOf(w) !== -1) n += 8;
    if(kw.indexOf(w) !== -1) n += 5;
    if(a.indexOf(w) !== -1) n += 3;
    if(s.indexOf(w) !== -1) n += 2;
  }
  return n;
}

function filtered(){
  var queryVal = state.query;
  var words = norm(queryVal).split(/\s+/).filter(Boolean);
  var list = [];
  for(var i = 0; i < FAQ_DATA.length; i++){
    var item = FAQ_DATA[i];
    var copied = {
      id: item.id,
      cat: item.cat,
      q: item.q,
      a: item.a,
      source: item.source,
      kw: item.kw,
      _idx: i,
      _score: score(item, words)
    };
    list.push(copied);
  }
  
  if(state.category !== '전체'){
    var filteredList = [];
    for(var j = 0; j < list.length; j++){
      if(list[j].cat === state.category){
        filteredList.push(list[j]);
      }
    }
    list = filteredList;
  }
  
  if(words.length){
    var filteredList2 = [];
    for(var k = 0; k < list.length; k++){
      var matched = true;
      var itemHaystack = norm(haystack(list[k], state.mode));
      for(var m = 0; m < words.length; m++){
        if(itemHaystack.indexOf(words[m]) === -1){
          matched = false;
          break;
        }
      }
      if(matched){
        filteredList2.push(list[k]);
      }
    }
    list = filteredList2;
  }
  
  if(state.sort === 'category'){
    list.sort(function(a, b){
      var catA = plain(a.cat), catB = plain(b.cat);
      var qA = plain(a.q), qB = plain(b.q);
      if (catA !== catB) return catA > catB ? 1 : -1;
      return qA > qB ? 1 : -1;
    });
  } else if(state.sort === 'question'){
    list.sort(function(a, b){
      var qA = plain(a.q), qB = plain(b.q);
      return qA > qB ? 1 : -1;
    });
  } else {
    list.sort(function(a, b){
      return (b._score - a._score) || (a._idx - b._idx);
    });
  }
  return list;
}

function renderCategories(){
  var categories = cats();
  var htmlArr = [];
  for(var i = 0; i < categories.length; i++){
    var cat = categories[i];
    var isOn = state.category === cat;
    htmlArr.push('<button class="chip ' + (isOn ? 'on' : '') + '" type="button" data-cat="' + esc(cat) + '">' + esc(cat) + '</button>');
  }
  $('categoryChips').innerHTML = htmlArr.join('');
}

function renderQuick(){
  var quickLabels = {
    '휴가는 어떻게 신청하나요?':'휴가 신청',
    '반일연가는 어떻게 계산하나요?':'반일연가',
    '초과근무수당 단가는 어디를 봐야 하나요?':'초과근무수당',
    '출장은 어디에서 신청하나요?':'출장 신청',
    '정보공개청구는 며칠 안에 결정해야 하나요?':'정보공개',
    '급여명세서는 어디서 확인하나요?':'급여명세서'
  };
  var found = [];
  for(var i = 0; i < popularTerms.length; i++){
    var q = popularTerms[i];
    var item = null;
    for(var j = 0; j < FAQ_DATA.length; j++){
      if(FAQ_DATA[j].q === q){
        item = FAQ_DATA[j];
        break;
      }
    }
    if(!item){
      for(var k = 0; k < FAQ_DATA.length; k++){
        if(norm(FAQ_DATA[k].q).indexOf(norm(q).slice(0, 8)) !== -1){
          item = FAQ_DATA[k];
          break;
        }
      }
    }
    if(item){
      found.push(item);
    }
  }
  
  var sliceList = found.slice(0, 8);
  var htmlArr = [];
  for(var m = 0; m < sliceList.length; m++){
    var i = sliceList[m];
    var label = quickLabels[i.q] || i.q;
    htmlArr.push('<button class="quick-chip" type="button" data-quick="' + esc(i.q) + '">' + esc(label) + '</button>');
  }
  $('quickList').innerHTML = htmlArr.join('');
}

// 🛡️ 2. iOS Safari DOM 렌더링 과부하 방지 (visibleLimit 기반 Slicing 및 더 보기 연동)
function renderList(){
  var list = filtered();
  $('resultCount').innerHTML = '<strong>' + list.length + '</strong> / ' + FAQ_DATA.length + '개';
  
  if (state.query) {
    $('clearBtn').classList.add('show');
  } else {
    $('clearBtn').classList.remove('show');
  }
  
  $('expandToggle').textContent = state.expanded ? '전체 접기' : '전체 펼치기';
  
  if(!list.length){
    $('faqList').innerHTML = '<div class="empty">검색 결과가 없습니다.</div>';
    return;
  }
  
  var limit = state.visibleLimit;
  var sliceList = list.slice(0, limit);
  
  var htmlArr = [];
  for(var i = 0; i < sliceList.length; i++){
    var item = sliceList[i];
    var source = plain(item.source);
    var isOpen = state.expanded || !(!state.query);
    var itemId = item.id || item._idx;
    var cardHtml = '<details class="faq-card" ' + (isOpen ? 'open' : '') + ' data-faq-id="' + esc(itemId) + '">' +
      '<summary>' +
        '<span class="q-badge">Q</span>' +
        '<span class="q-wrap">' +
          '<span class="q-text">' + highlight(item.q, state.query) + '</span>' +
          '<span class="q-meta"><span class="cat-pill">' + esc(item.cat || '기타') + '</span></span>' +
        '</span>' +
        '<span class="chev">⌄</span>' +
      '</summary>' +
      '<div class="answer">' +
        '<span class="a-badge">A</span>' +
        '<div class="answer-body">' +
          highlight(item.a, state.query) +
          (source ? '<div class="source">출처: ' + esc(source) + '</div>' : '') +
          '<div class="tools"><button class="tool" type="button" data-copy="' + esc(itemId) + '">답변 복사</button></div>' +
        '</div>' +
      '</div>' +
    '</details>';
    htmlArr.push(cardHtml);
  }
  
  if (list.length > limit) {
    var remain = list.length - limit;
    var moreHtml = '<div class="more-btn-wrap">' +
      '<button id="moreBtn" class="more-btn" type="button">' +
        '더 보기 (' + remain + '개 남음)' +
      '</button>' +
    '</div>';
    htmlArr.push(moreHtml);
  }
  
  $('faqList').innerHTML = htmlArr.join('');
}

function renderAll(){
  renderCategories();
  renderList();
}

function showToast(msg){
  var el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(function(){
    el.classList.remove('show');
  }, 1300);
}

function copyText(text){
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }
  } catch(e) {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
  showToast('복사했습니다');
}

function bind(){
  $('searchInput').addEventListener('input', function(e) {
    state.query = e.target.value;
    state.visibleLimit = 25;
    renderList();
  });
  
  $('clearBtn').addEventListener('click', function() {
    $('searchInput').value = '';
    state.query = '';
    state.visibleLimit = 25;
    renderList();
    $('searchInput').focus();
  });
  
  $('searchMode').addEventListener('change', function(e) {
    state.mode = e.target.value;
    state.visibleLimit = 25;
    renderList();
  });
  
  $('sortMode').addEventListener('change', function(e) {
    state.sort = e.target.value;
    state.visibleLimit = 25;
    renderList();
  });
  
  $('categoryChips').addEventListener('click', function(e) {
    var btn = e.target;
    while(btn && btn !== document.body) {
      if(btn.getAttribute && btn.getAttribute('data-cat') !== null) {
        break;
      }
      btn = btn.parentNode;
    }
    if(!btn || btn === document.body) return;
    state.category = btn.getAttribute('data-cat');
    state.expanded = false;
    state.visibleLimit = 25;
    renderAll();
  });
  
  $('quickList').addEventListener('click', function(e) {
    var btn = e.target;
    while(btn && btn !== document.body) {
      if(btn.getAttribute && btn.getAttribute('data-quick') !== null) {
        break;
      }
      btn = btn.parentNode;
    }
    if(!btn || btn === document.body) return;
    state.query = btn.getAttribute('data-quick');
    $('searchInput').value = state.query;
    state.category = '전체';
    state.expanded = false;
    state.visibleLimit = 25;
    renderAll();
    window.scrollTo({top:0,behavior:'smooth'});
  });
  
  $('expandToggle').addEventListener('click', function() {
    state.expanded = !state.expanded;
    renderList();
  });
  
  $('faqList').addEventListener('click', function(e) {
    // 🛡️ 더 보기 버튼 이벤트 위임 처리
    var moreBtn = e.target;
    while(moreBtn && moreBtn !== document.body) {
      if(moreBtn.id === 'moreBtn') {
        break;
      }
      moreBtn = moreBtn.parentNode;
    }
    if(moreBtn && moreBtn.id === 'moreBtn') {
      state.visibleLimit += 25;
      renderList();
      return;
    }

    // 기존의 복사 버튼 클릭 로직
    var btn = e.target;
    while(btn && btn !== document.body) {
      if(btn.getAttribute && btn.getAttribute('data-copy') !== null) {
        break;
      }
      btn = btn.parentNode;
    }
    if(!btn || btn === document.body) return;
    var copyId = btn.getAttribute('data-copy');
    var item = null;
    for(var i = 0; i < FAQ_DATA.length; i++){
      if(String(FAQ_DATA[i].id) === String(copyId)){
        item = FAQ_DATA[i];
        break;
      }
    }
    if(!item){
      item = FAQ_DATA[Number(copyId)];
    }
    if(item){
      copyText('Q. ' + plain(item.q) + '\nA. ' + plain(item.a) + (item.source ? '\n출처: ' + plain(item.source) : ''));
    }
  });
  
  $('topBtn').addEventListener('click', function() {
    window.scrollTo({top:0,behavior:'smooth'});
  });
}

function init() {
  bind();
  renderQuick();
  renderAll();
  
  // 🛡️ 테마 데이터 정리 및 라이트모드 고정 (safeStorage를 통한 SecurityError 방어벽)
  safeStorage.removeItem('faq-theme');
  document.body.setAttribute('data-theme', 'light');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
