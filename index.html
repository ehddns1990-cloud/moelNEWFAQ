<style>
:root{
  --bg:hsl(210,26%,97%);--surface:hsl(0,0%,100%);--surface-2:hsl(210,24%,94%);--line:hsl(214,25%,86%);
  --text:hsl(220,28%,13%);--muted:hsl(215,13%,43%);--accent:hsl(214,88%,52%);--accent-2:hsl(171,78%,33%);
  --accent-soft:hsl(214,92%,95%);--warn:hsl(355,72%,48%);--shadow:0 10px 24px hsla(219,30%,18%,.08);--radius:8px;
}
body[data-skin="galaxy"]{
  --bg:hsl(84,24%,96%);--surface:hsl(0,0%,100%);--surface-2:hsl(86,18%,91%);--line:hsl(95,12%,82%);
  --text:hsl(214,24%,12%);--muted:hsl(213,11%,38%);--accent:hsl(218,93%,48%);--accent-2:hsl(150,62%,32%);
  --accent-soft:hsl(213,88%,94%);--warn:hsl(8,70%,48%);--shadow:0 8px 22px hsla(204,26%,20%,.10);

  font-weight: 600;

/* 포커스/활성화 시에는 영롱함 2배 펌핑 효과 */
.searchbox:focus-within {
  box-shadow: 0 0 0 3px rgba(41, 182, 246, 0.14), 0 12px 32px -8px rgba(171, 71, 188, 0.22);
}
.searchbox:focus-within::before {
  animation: rotateGlow 2.8s linear infinite; /* 활성화 시 휘잉 회전 속도 펌핑 */
}

.search-icon {
  left: 17px;
  color: var(--muted);
  font-size: 19px;
  opacity: 0.85;
  z-index: 3; /* 인풋 위로 올림 */
}

.clear-btn {
  right: 10px;
  background: #f1f5f9;
  color: var(--muted);
  z-index: 3; /* 인풋 위로 올림 */
}

.clear-btn:active {
  background: #e2e8f0;
}

/* ==========================================================================
   FILTERS
   ========================================================================== */
.filters {
  display: grid !important;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}

.select-wrap {
  position: relative;
  display: block;
  width: 100%;
}

/* 붙임4 사양의 정밀한 아래 화살표(▼) 커스텀 표시 지점 설계 */
.select-wrap::after {
  content: '▼';
  font-size: 8px;
  color: #94a3b8;
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none; /* 클릭 이벤트가 하단 select로 완벽 투과 */
  transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.select-wrap:focus-within::after {
  color: var(--accent);
  transform: translateY(-50%) rotate(180deg); /* 쫀득하게 화살표가 위로 뒤집히는 초프리미엄 모션 */
}

.select-wrap select {
  width: 100%;
  height: 38px;
  border-radius: 14px;
  border: 1px solid rgba(226, 232, 240, 0.85);
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: #334155;
  font-size: 13px;
  font-weight: 800;
  padding: 0 28px 0 12px; /* 우측 화살표 아이콘 영역을 침범하지 않도록 여유 패딩 확보 */
  -webkit-appearance: none;
  appearance: none;
  transition: all 0.25s ease;
}

.select-wrap select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(41, 182, 246, 0.08);
}

.meta-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin: 10px 4px 0;
  color: var(--muted);
  font-size: 12.5px;
  font-weight: 600;
}

.result-count strong {
  color: #1d4ed8;
  font-weight: 950;
}

.expand-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 28px;
  padding: 4px 12px;
  border-radius: 999px;
  background: rgba(41, 182, 246, 0.08);
  border: 1px solid rgba(41, 182, 246, 0.15);
  color: #0284c7;
  font-size: 12px;
  font-weight: 900;
  transition: all 0.2s ease;
}

.expand-toggle:active {
  transform: scale(0.96);
  background: rgba(41, 182, 246, 0.15);
}

/* ==========================================================================
   CHIPS & BUTTONS (예쁘게 개편 및 쫀득한 스케일 모션 탑재)
   ========================================================================== */
.quick {
  max-width: 820px;
  padding: 4px 16px 8px;
}

.quick-title {
  margin-bottom: 7px;
}

.quick-title span {
  font-size: 12px;
  font-weight: 950;
  color: var(--muted);
  letter-spacing: 0.03em;
}

.quick-scroller {
  gap: 8px;
  padding-bottom: 8px;
}

.quick-chip {
  max-width: none;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1.5px solid rgba(226, 232, 240, 0.8);
  color: #1e3a8a;
  font-size: 12.5px;
  font-weight: 900;
  box-shadow: 0 4px 12px -4px rgba(15, 23, 42, 0.04);
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.quick-chip:active {
  transform: scale(0.95);
  background: rgba(255, 255, 255, 0.95);
  border-color: rgba(41, 182, 246, 0.4);
}

.quick::after,
.catbar::after {
  content: "" !important;
  background: linear-gradient(90deg, rgba(248, 250, 252, 0), #f8fafc 82%) !important;
  box-shadow: none !important;
}

.catbar {
  position: sticky;
  top: calc(164px + env(safe-area-inset-top)); /* topbar(50px) + search-panel(114px) 정밀 누적합산 고정 */
  z-index: 17;
  background: rgba(248, 250, 252, 0.94);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-top: 0;
  border-bottom: 1.5px solid rgba(226, 232, 240, 0.7);
}

.chips {
  max-width: 820px;
  gap: 8px;
  padding: 10px 16px;
}

.chip {
  padding: 8px 13px;
  border-radius: 999px;
  border: 1.5px solid rgba(226, 232, 240, 0.8);
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: #475569;
  font-size: 12.5px;
  font-weight: 950;
  box-shadow: 0 4px 10px -4px rgba(15, 23, 42, 0.02);
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.chip:active {
  transform: scale(0.95);
}

/* 활성화 상태: 단색 스카이 블루 배경 + 부드러운 블루 광채 */
.chip.on {
  background: #29b6f6;
  border-color: transparent;
  color: #ffffff;
  box-shadow: 0 8px 18px -4px rgba(41, 182, 246, 0.35);
  text-shadow: 0 1px 1px rgba(0, 0, 0, 0.05);
}

/* ==========================================================================
   FAQ CARDS (글래스모피즘 아코디언 & 발광 그라데이션 보더)
   ========================================================================== */
.content {
  max-width: 820px;
  padding: 14px 16px 20px;
}

.faq-list {
  gap: 12px;
}

.faq-card {
  border: 1.5px solid rgba(226, 232, 240, 0.85);
  border-radius: 20px !important;
  background: rgba(255, 255, 255, 0.86);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 8px 24px -8px rgba(15, 23, 42, 0.04), 0 2px 6px -4px rgba(15, 23, 42, 0.02) !important;
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.faq-card:hover {
  transform: translateY(-2.5px);
  box-shadow: 0 16px 36px -10px rgba(15, 23, 42, 0.08), 0 4px 16px -6px rgba(41, 182, 246, 0.04) !important;
}

/* 펼쳐진 카드: 극상의 안티그래비티 그라데이션 보더 공법 */
.faq-card[open] {
  border: 1.5px solid transparent;
  background-image: linear-gradient(rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.94)), var(--antigravity-gradient);
  background-origin: border-box;
  background-clip: padding-box, border-box;
  box-shadow: 0 20px 45px -12px rgba(41, 182, 246, 0.14), 0 10px 22px -10px rgba(171, 71, 188, 0.08) !important;
}

.faq-card summary {
  grid-template-columns: auto minmax(0, 1fr) auto;
  gap: 11px;
  align-items: start;
  padding: 16px 16px 15px;
  cursor: pointer;
  user-select: none;
}

.q-badge,
.a-badge {
  width: 23px;
  height: 23px;
  border-radius: 9px !important;
  font-size: 11.5px;
  font-weight: 950;
}

/* Q 뱃지를 정갈한 단색 로열 바이올렛으로 리디자인 */
.q-badge {
  background: #ab47bc;
  color: #ffffff;
  box-shadow: 0 4px 10px -2px rgba(171, 71, 188, 0.2);
  text-shadow: 0 0.5px 1px rgba(0,0,0,0.05);
}

.a-badge {
  background: #f1f5f9;
  color: #64748b;
}

.q-text {
  display: block;
  font-size: 14.8px;
  line-height: 1.5;
  font-weight: 950;
  letter-spacing: -0.025em;
  color: #0f172a;
}

.q-meta {
  margin-top: 7px;
  gap: 6px;
}

.cat-pill,
.source-pill {
  padding: 3.5px 9px;
  border-radius: 999px;
  font-size: 10.5px;
  font-weight: 950;
}

.cat-pill {
  background: rgba(13, 148, 136, 0.08);
  border: 1px solid rgba(13, 148, 136, 0.15);
  color: #0f766e;
}

.source-pill {
  background: rgba(226, 232, 240, 0.6);
  color: var(--muted);
}

.chev {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  color: #94a3b8;
  background: rgba(241, 245, 249, 0.7);
  transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.25s ease, color 0.25s ease;
}

.faq-card[open] .chev {
  color: #ffffff;
  background: #29b6f6;
  box-shadow: 0 4px 10px -2px rgba(41, 182, 246, 0.25);
}

.answer {
  gap: 10px;
  padding: 0 16px 16px;
}

.answer-body {
  font-size: 14.2px;
  line-height: 1.75;
  color: #1e293b;
  word-break: keep-all;
  overflow-wrap: anywhere;
}

.source {
  margin-top: 14px;
  padding: 11px 14px;
  border: 1px solid rgba(226, 232, 240, 0.8);
  border-radius: 14px;
  background: rgba(248, 250, 252, 0.8);
  color: var(--muted);
  font-size: 11.8px;
  line-height: 1.6;
}

.tools {
  margin-top: 12px;
  gap: 8px;
}

.tool {
  height: 33px;
  padding: 0 12px;
  border-radius: 999px;
  background: rgba(41, 182, 246, 0.08);
  border: 1px solid rgba(41, 182, 246, 0.15);
  color: #0284c7;
  font-size: 12px;
  font-weight: 950;
  transition: all 0.2s ease;
}

.tool:active {
  transform: scale(0.96);
  background: rgba(41, 182, 246, 0.15);
}

.empty {
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(8px);
  border: 1.5px dashed rgba(203, 213, 225, 0.8);
}

.notice {
  max-width: 820px;
  margin-top: 8px;
}

.notice-inner {
  margin: 0 4px;
  padding: 14px 0 0;
  border-top: 1.5px solid rgba(226, 232, 240, 0.7);
  color: var(--muted);
  font-size: 11.8px;
  line-height: 1.65;
}

/* ==========================================================================
   FLOATING WIDGETS
   ========================================================================== */
.to-top {
  width: 44px;
  height: 44px;
  border-radius: 16px;
  background: #29b6f6;
  border: 0;
  color: #ffffff;
  box-shadow: 0 10px 24px -4px rgba(41, 182, 246, 0.35);
  font-size: 21px;
  text-shadow: 0 1px 1px rgba(0, 0, 0, 0.05);
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.to-top:active {
  transform: scale(0.9);
}

.toast {
  background: rgba(15, 23, 42, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  box-shadow: 0 12px 32px -8px rgba(15, 23, 42, 0.25);
  font-weight: 800;
  border-radius: 999px;
  padding: 10px 16px;
  font-size: 12.5px;
}

mark {
  background: #fef08a; /* Soft Yellow 200 */
  color: #854d0e;
  border-radius: 6px;
  padding: 0 3px;
  box-shadow: inset 0 -2px 0 rgba(133, 77, 14, 0.05);
}

body[data-skin="galaxy"] .topbar,
body[data-skin="galaxy"] .searchbox input,
body[data-skin="galaxy"] .filter-btn,
body[data-skin="galaxy"] .faq-card,
body[data-skin="galaxy"] .chip.on {
  background: inherit;
  box-shadow: inherit;
}

/* ==========================================================================
   RESPONSIVE DESIGN (MEDIA QUERIES)
   ========================================================================== */
@media(min-width:700px) {
  .hero h1 {
    font-size: 34px;
  }
  .content {
    padding-top: 16px;
  }
  .faq-list {
    grid-template-columns: 1fr 1fr;
  }
  .faq-card summary {
    min-height: 106px;
  }
  .faq-card[open] {
    grid-column: span 2;
  }
  .filters {
    grid-template-columns: 190px 190px;
  }
}

@media(max-width:560px) {
  .toprow {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-title strong {
    font-size: 16.5px;
    line-height: 1.25;
    word-break: keep-all;
  }
  .brand-title span {
    font-size: 11px;
  }
  .hero {
    padding-top: 20px;
  }
  .search-panel {
    top: calc(51px + env(safe-area-inset-top));
  }
  .catbar {
    top: calc(164px + env(safe-area-inset-top)); /* 560px 이하 해상도에서도 누적 높이 동기화 */
  }
  .meta-row {
    display: flex;
    flex-direction: row;
    align-items: center;
  }
}

@media(max-width:390px) {
  body {
    font-size: 14px;
  }
  .hero h1 {
    font-size: 24px;
  }
  .searchbox input {
    font-size: 16px !important; /* 모바일 초소형 뷰에서도 줌인 예외 발생을 방지하기 위해 16px 사수 */
    height: 48px;
  }
  .search-panel {
    top: calc(49px + env(safe-area-inset-top));
  }
  .catbar {
    top: calc(156px + env(safe-area-inset-top)); /* 390px 이하 누적 높이 연산 보정 */
  }
  .q-text {
    font-size: 14.2px;
  }
  .answer-body {
    font-size: 13.5px;
  }
  .filters {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .select-wrap select {
    font-size: 12px;
    padding: 0 10px;
  }
}

/* ==========================================================================
   🌐 PREMIUM DAWOORI MOBILE LINK & META CONTAINER
   ========================================================================== */
.dawoori-btn {
  height: 38px;
  padding: 0 16px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.85);

  font-size: 12.5px;
  font-weight: 950;

  align-items: center;
  justify-content: center;
  -webkit-appearance: none;
  appearance: none;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  margin-left: auto;
  box-shadow: 0 4px 14px -4px rgba(41, 182, 246, 0.16);
  letter-spacing: -0.02em;
  white-space: nowrap; /* 줄바꿈 절대 방지 */
}

.dawoori-btn:hover {
  transform: translateY(-1px) scale(1.02);
  box-shadow: 0 6px 18px -4px rgba(171, 71, 188, 0.2);

}

.dawoori-btn:active {
  transform: scale(0.93);
  background: rgba(255, 255, 255, 0.98);
}

.meta-row-container {
  max-width: 820px;
  margin: 0 auto;
  padding: 4px 16px 8px; /* 스티키 누적 겹침을 완벽 제어하는 자연스러운 패딩 */
}

@media(prefers-reduced-motion:reduce) {
  * {
    scroll-behavior: auto !important;
    transition: none !important;
    animation: none !important;
  }
}

/* ==========================================================================
   더 보기 버튼 스타일 (오렌지-블루-퍼플 프리미엄 스펙트럼)

var FAQ_DATA = [{"id":"nfaq_001","cat":"휴가·복무","q":"공무원 휴가는 어떤 종류가 있나요?","a":"국가공무원의 휴가는 연가, 병가, 공가, 특별휴가로 구분합니다. 휴가는 사유와 요건이 다르므로 먼저 휴가 종류를 정하고, 해당 휴가의 일수·증빙·사용기한을 확인한 뒤 신청해야 합니다.","source":"「국가공무원 복무·징계 관련 예규」, 인사혁신처 예규 제203호(2026.1.1. 시행), 제8장 휴가, p.148~149, 「2026 공직을 여행하는 신규공무원을 위한 안내서」, Ⅳ 휴가와 근무시간, p.48","kw":["휴가·복무","공무원","휴가는","어떤","종류가","있나요"]},{"id":"nfaq_002","cat":"휴가·복무","q":"휴가는 어떻게 신청하나요?","a":"e-사람에서 복무 → 근무상황 → 근무상황 신청 및 변경 → 근무상황신청으로 들어가 종별, 기간, 시간, 사유를 입력합니다. 입력 후 반드시 “추가”를 눌러 신청대상 목록에 올린 뒤 결재신청까지 해야 합니다.","source":"「2026 슬기로운 고용노동부 생활」, 제1장 e-사람 활용법, 연가 신청, p.8~11, 「국가공무원 복무·징계 관련 예규」, 제8장 휴가 승인절차, p.149","kw":["휴가·복무","휴가는","어떻게","신청하나요"]},{"id":"nfaq_003","cat":"휴가·복무","q":"반일연가는 어떻게 계산하나요?","a":"반일연가 1회는 4시간으로 계산합니다. 반일연가 2회는 연가 1일로 공제됩니다. 지각·조퇴·외출·반일연가 시간은 종별 구분 없이 합산하고, 8시간을 연가 1일로 환산하여 공제합니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 휴가, 연가 시간 단위 공제, p.172","kw":["휴가·복무","반일연가는","어떻게","계산하나요"]},{"id":"nfaq_004","cat":"휴가·복무","q":"병가는 연 며칠까지 사용할 수 있나요?","a":"일반병가는 질병·부상으로 직무를 수행할 수 없거나 감염병으로 출근이 다른 공무원의 건강에 영향을 줄 우려가 있을 때 연간 60일 범위에서 승인됩니다. 공무상 병가는 공무상 질병·부상으로 직무수행이 어렵거나 요양이 필요한 경우 연간 180일 범위에서 승인됩니다.\n\r\n원문 예시: 위암으로 인한 수술·입원으로 직무를 수행할 수 없는 경우, 장애인 공무원이 재활치료를 하지 않으면 직무를 수행할 수 없는 경우가 병가 예시로 제시되어 있습니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 휴가, 병가의 종류별 내용, p.177","kw":["휴가·복무","병가는","며칠까지","사용할","있나요"]},{"id":"nfaq_005","cat":"휴가·복무","q":"병가 때 진단서는 언제 필요한가요?","a":"병가는 질병·부상으로 직무를 수행할 수 없거나 감염병으로 출근이 다른 공무원의 건강에 영향을 줄 우려가 있는 경우 등 병가 사유에 해당할 때 사용하는 휴가입니다. 연간 누계 6일까지는 진단서 없이 병가를 승인할 수 있지만, 병가의 사유 요건 자체가 없어지는 것은 아닙니다. 7일 이상 연속되는 병가 또는 병가의 연간 누계가 6일을 초과하게 되는 경우에는 진단서를 제출해야 합니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 휴가, 병가의 운영방법, p.177~178","kw":["휴가·복무","병가","진단서는","언제","필요한가요"]},{"id":"nfaq_006","cat":"휴가·복무","q":"진단서를 제출하지 못한 병가는 어떻게 되나요?","a":"진단서를 제출해야 하는 병가인데 제출하지 못한 경우, 그 병가일수는 연가일수에서 공제하고 병가일수에는 산입하지 않습니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 휴가, 병가일수의 계산, p.177","kw":["휴가·복무","진단서를","제출하지","못한","병가는","어떻게","되나요"]},{"id":"nfaq_007","cat":"휴가·복무","q":"건강검진은 공가인가요?","a":"산업안전보건법상 건강진단, 국민건강보험법상 건강검진, 결핵예방법상 결핵검진 등 예규가 정한 건강검진은 공가 사유에 해당합니다. 다만 개인 선택 검진이나 단순 진료는 이 근거만으로 공가라고 단정할 수 없습니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 휴가, 공가 사유 7호, p.181, 공가 운영상 유의사항, p.182","kw":["휴가·복무","건강검진은","공가인가요"]},{"id":"nfaq_008","cat":"휴가·복무","q":"공가는 아무 공적인 일에나 쓸 수 있나요?","a":"아닙니다. 공가는 병역판정검사, 공무 관련 국가기관 소환, 법률상 투표, 건강검진, 헌혈, 예비군훈련 등 예규에 열거된 사유에 해당해야 사용할 수 있습니다. 단순히 공적인 일처럼 보인다는 이유만으로 공가가 되는 것은 아닙니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 휴가, 공가 사유, p.181~182","kw":["휴가·복무","공가는","아무","공적인","일에나","있나요"]},{"id":"nfaq_009","cat":"휴가·복무","q":"경조사 휴가는 며칠인가요?","a":"대표적으로 본인 결혼은 5일, 자녀 결혼은 1일, 배우자 출산은 20일, 다태아 출산은 25일, 본인 입양은 20일입니다. 사망의 경우 배우자·본인 및 배우자의 부모는 5일, 조부모·외조부모·자녀와 그 배우자·형제자매는 3일입니다.","source":"「국가공무원 복무규정」 [별표 2] 경조사별 휴가 일수표, 「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-경조사휴가, p.184~185","kw":["휴가·복무","경조사","휴가는","며칠인가요"]},{"id":"nfaq_010","cat":"휴가·복무","q":"경조사휴가에 원격지 가산이 가능한가요?","a":"입양 외의 경조사휴가를 원격지에서 실시하는 경우 실제 왕복에 필요한 일수를 더할 수 있습니다. 복무예규는 원격지를 가장 빠른 교통수단으로도 왕복 8시간 이상 소요되는 지역으로 보고, 2일 범위에서 왕복소요일수를 가산할 수 있다고 설명합니다.","source":"「국가공무원 복무규정」 [별표 2] 비고, 「국가공무원 복무·징계 관련 예규」, 제8장 경조사휴가 운영, p.185","kw":["휴가·복무","경조사휴가에","원격지","가산이","가능한가요"]},{"id":"nfaq_011","cat":"휴가·복무","q":"본인 결혼 경조사휴가는 언제까지 쓸 수 있나요?","a":"본인 결혼 휴가는 결혼식일 또는 혼인신고일부터 30일 이내의 범위에서 사용할 수 있습니다. 업무상 불가피하게 30일 이내 사용이 어려운 경우에는 90일 이내의 범위에서 사용할 수 있습니다.\n\r\n원문 사례: 2020년 6월 13일 토요일에 본인이 결혼하는 경우, 7월 8일부터 휴가를 사용하면 7월 12일까지 사용할 수 있고, 30일이 초과되는 7월 13일부터는 사용할 수 없습니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 경조사휴가 운영, p.185~188","kw":["휴가·복무","본인","결혼","경조사휴가는","언제까지","있나요"]},{"id":"nfaq_012","cat":"휴가·복무","q":"배우자 출산휴가는 며칠이고 나누어 쓸 수 있나요?","a":"배우자 출산휴가는 20일입니다. 한 번에 둘 이상의 자녀를 출산한 경우에는 25일입니다. 배우자 출산예정일 30일 전부터 출산 후 120일 이내에 3회까지 나누어 쓸 수 있고, 다태아의 경우 출산 후 150일 이내에 5회까지 나누어 쓸 수 있습니다.\n\r\n원문 사례: 2025년 2월 20일 목요일에 배우자가 한 명의 자녀를 출산한 경우, 5월 27일부터 사용하면 6월 19일까지 사용할 수 있고, 120일이 초과되는 6월 20일부터는 사용할 수 없습니다.","source":"「국가공무원 복무규정」 [별표 2], 「국가공무원 복무·징계 관련 예규」, 제8장 경조사휴가 운영, p.185~188","kw":["휴가·복무","배우자","출산휴가는","며칠이고","나누어","있나요"]},{"id":"nfaq_013","cat":"휴가·복무","q":"출산휴가는 어떻게 부여되나요?","a":"임신 중인 여성공무원은 출산 전후를 통하여 90일의 출산휴가를 사용할 수 있고, 한 번에 둘 이상의 자녀를 임신한 경우에는 120일의 출산휴가를 사용할 수 있습니다. 출산 후 휴가기간이 일정 기간 이상 확보되도록 운영해야 합니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-출산휴가, p.187~188","kw":["휴가·복무","출산휴가는","어떻게","부여되나요"]},{"id":"nfaq_014","cat":"휴가·복무","q":"유산·사산휴가는 임신기간별로 어떻게 다른가요?","a":"유산·사산휴가는 임신기간에 따라 사용 가능 기간이 달라집니다. 임신 11주 이내는 유산·사산한 날부터 5일까지, 12주 이상 15주 이내는 10일까지, 16주 이상 21주 이내는 30일까지, 22주 이상 27주 이내는 60일까지, 28주 이상은 90일까지 사용할 수 있습니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-유산·사산휴가, p.188~189","kw":["휴가·복무","유산","사산휴가는","임신기간별로","어떻게","다른가요"]},{"id":"nfaq_015","cat":"휴가·복무","q":"배우자가 유산하거나 사산한 경우 남성 공무원도 휴가가 있나요?","a":"배우자가 유산하거나 사산한 경우 남성 공무원은 3일의 배우자 유산휴가 또는 사산휴가를 사용할 수 있습니다. 해당 휴가는 정해진 기간 내에 사용해야 하며, 1회에 한하여 분할 사용할 수 있습니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-배우자 유산·사산휴가, p.189","kw":["휴가·복무","배우자가","유산하거나","사산한","경우","남성","공무원도","휴가가","있나요"]},{"id":"nfaq_016","cat":"휴가·복무","q":"난임치료시술휴가는 며칠인가요?","a":"난임치료시술휴가는 시술 종류에 따라 다릅니다. 여성공무원은 인공수정 등은 2일, 동결보존 배아 이식 체외수정은 3일, 난자 채취를 수반하는 체외수정은 4일 범위에서 사용할 수 있습니다. 남성공무원은 정자 채취일에 1일을 사용할 수 있습니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-난임치료시술휴가, p.189~191","kw":["휴가·복무","난임치료시술휴가는","며칠인가요"]},{"id":"nfaq_017","cat":"휴가·복무","q":"난임치료시술휴가는 시간 단위로 쓸 수 있나요?","a":"아닙니다. 난임치료시술휴가는 일 단위로만 사용할 수 있습니다. 해당일에는 유연근무제를 활용하지 않도록 사전에 조치해야 합니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-난임치료시술휴가, p.191","kw":["휴가·복무","난임치료시술휴가는","시간","단위로","있나요"]},{"id":"nfaq_018","cat":"휴가·복무","q":"여성보건휴가는 유급인가요?","a":"여성공무원은 생리기간 중 휴식을 위하여 매월 1일의 여성보건휴가를 사용할 수 있습니다. 여성보건휴가는 무급이고, 일 단위로만 사용할 수 있습니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-여성보건휴가, p.191","kw":["휴가·복무","여성보건휴가는","유급인가요"]},{"id":"nfaq_019","cat":"휴가·복무","q":"모성보호시간은 하루 몇 시간까지 가능한가요?","a":"임신 중인 여성공무원은 1일 2시간 범위에서 모성보호시간을 사용할 수 있습니다. 모성보호시간 사용 시 하루 최소근무시간은 4시간 이상이어야 하며, 이를 충족하지 못하면 연가로 처리됩니다. 모성보호시간은 육아시간과 중복하여 사용할 수 없습니다.\n\r\n원문 예시: 1일 근무시간 10시간 30분 또는 10시간인 경우 모성보호시간 0~2시간 사용 가능, 5시간인 경우 0~1시간 사용 가능, 4시간인 경우 사용 불가입니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-모성보호시간, p.191~192","kw":["휴가·복무","모성보호시간은","하루","시간까지","가능한가요"]},{"id":"nfaq_020","cat":"휴가·복무","q":"육아시간은 누가 사용할 수 있나요?","a":"8세 이하 또는 초등학교 2학년 이하의 자녀가 있는 공무원은 자녀를 돌보기 위하여 36개월 범위에서 1일 최대 2시간의 육아시간을 사용할 수 있습니다. 사용 시 하루 최소근무시간은 4시간 이상이어야 합니다.\n\r\n원문 예시: 1일 8시간 근무 기준 육아시간 2시간과 연가 3시간을 사용하면 연가 5시간 사용으로 처리하고, 육아시간 2시간과 병가 4시간을 사용하면 연가 2시간, 병가 4시간 사용으로 처리합니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-육아시간, p.192~194, 「유연근무제 세부운영지침」 개정본, Q\u0026A 1, p.3~4","kw":["휴가·복무","육아시간은","누가","사용할","있나요"]},{"id":"nfaq_021","cat":"휴가·복무","q":"가족돌봄휴가는 연 며칠까지 가능한가요?","a":"가족돌봄휴가는 유급·무급을 포함하여 연간 총 10일 범위에서 사용할 수 있습니다. 자녀 돌봄 목적의 유급 가족돌봄휴가는 자녀 수에 1일을 더한 일수 범위에서 인정되고, 장애인 자녀 또는 한부모 가족 등은 1일을 추가로 받을 수 있습니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-가족돌봄휴가, p.197~199","kw":["휴가·복무","가족돌봄휴가는","며칠까지","가능한가요"]},{"id":"nfaq_022","cat":"휴가·복무","q":"가족돌봄휴가는 어떤 경우에 쓸 수 있나요?","a":"어린이집·유치원·학교의 휴업·휴원·휴교, 자녀 또는 손자녀의 공식 행사·교사 상담, 미성년자 또는 장애인 자녀·손자녀의 병원 진료 동행, 조부모·외조부모·부모·배우자·자녀·손자녀의 질병·사고·노령으로 인한 돌봄 등이 가족돌봄휴가 사유입니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-가족돌봄휴가, p.197~199","kw":["휴가·복무","가족돌봄휴가는","어떤","경우에","있나요"]},{"id":"nfaq_023","cat":"휴가·복무","q":"임신검진휴가는 어떻게 쓰나요?","a":"임신 중인 여성공무원은 임신검진을 위해 10일 범위에서 임신검진휴가를 사용할 수 있습니다. 임신 중 임용된 경우에도 남은 임신기간에 걸쳐 10일을 사용할 수 있으나, 실제 출산한 날부터는 잔여일수가 있어도 사용할 수 없습니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-임신검진휴가, p.199~200","kw":["휴가·복무","임신검진휴가는","어떻게","쓰나요"]},{"id":"nfaq_024","cat":"휴가·복무","q":"남성 공무원도 임신검진 동행휴가를 쓸 수 있나요?","a":"남성공무원은 배우자의 임신기간 중 임신검진에 동행하기 위해 10일 범위에서 임신검진 동행휴가를 사용할 수 있습니다. 최초 신청 시 가족관계증명서와 배우자의 임신확인서 등을 제출하고, 신청 시 배우자의 임신검진 확인자료를 증빙해야 합니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-임신검진 동행휴가, p.200","kw":["휴가·복무","남성","공무원도","임신검진","동행휴가를","있나요"]},{"id":"nfaq_025","cat":"휴가·복무","q":"심리안정휴가는 어떤 경우 사용할 수 있나요?","a":"위험직무 수행 중 동료 사망 등 예규가 정한 사건·사고를 직접 경험한 경우 심리안정휴가 대상이 될 수 있습니다. 사건·사고 인정기준, 사용일수와 증빙은 예규의 심리안정휴가 항목을 기준으로 판단해야 합니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-심리안정휴가, p.200~202","kw":["휴가·복무","심리안정휴가는","어떤","경우","사용할","있나요"]},{"id":"nfaq_026","cat":"휴가·복무","q":"시간선택제공무원의 휴가는 전일제와 똑같이 계산하나요?","a":"시간선택제공무원 등의 휴가는 근무시간에 비례하여 산정하는 등 별도 기준이 있는 경우가 있습니다. 연가와 병가는 시간 단위로 실시하며, 주당 근무시간에 비례하여 산정합니다.\n\r\n원문 예시: 근무시간이 4시간인 공무원은 하루 24시간의 휴식을 단절 없이 보장한다는 의미에서 그 공무원의 근무시간인 4시간을 1일로 봅니다.","source":"「국가공무원 복무규정」 [별표 3], 「국가공무원 복무·징계 관련 예규」, 시간선택제공무원등에 대한 휴가 기준, p.205~206","kw":["휴가·복무","시간선택제공무원의","휴가는","전일제와","똑같이","계산하나요"]},{"id":"nfaq_027","cat":"휴가·복무","q":"장기재직휴가는 언제 사용할 수 있나요?","a":"장기재직휴가는 재직기간이 10년 이상인 공무원에게 재직기간 구간별로 부여되는 특별휴가입니다. 재직기간 10년 이상 20년 미만은 5일, 20년 이상 30년 미만은 7일, 30년 이상은 7일입니다. 과거 지방공무원 등으로 재직하면서 유사한 장기재직휴가·학습휴가 등을 이미 부여받아 사용한 경우에는 국가공무원 장기재직휴가 부여일수에 영향을 줄 수 있으므로 인사담당자에게 확인하시기 바랍니다.","source":"「국가공무원 복무·징계 관련 예규」, 제8장 특별휴가-장기재직휴가, p.203~205, 「2026 슬기로운 고용노동부 생활」, 장기재직휴가 안내","kw":["휴가·복무","장기재직휴가는","언제","사용할","있나요"]},{"id":"nfaq_028","cat":"휴가·복무","q":"예비군·민방위 훈련은 어떤 휴가를 쓰나요?","a":"예비군훈련이나 민방위훈련은 법정 의무 이행 성격이므로 공가 사유에 해당합니다. 훈련 통지서, 참석 확인 자료 등 실제 훈련 참석을 확인할 수 있는 증빙을 갖추는 것이 안전합니다.","source":"「국가공무원 복무·징계 관련 예규」, 공가 사유, p.181~184","kw":["휴가·복무","예비군","민방위","훈련은","어떤","휴가를","쓰나요"]},{"id":"nfaq_029","cat":"휴가·복무","q":"외출·지각·조퇴는 연가에서 어떻게 공제되나요?","a":"질병이나 부상 외의 사유로 인한 지각·조퇴·외출과 반일연가는 합산하여 8시간을 연가 1일로 계산합니다. 따라서 시간 단위 사용 내역은 누적 관리가 필요합니다.","source":"「국가공무원 복무·징계 관련 예규」, 연가 시간 단위 공제, p.172","kw":["휴가·복무","외출","지각","조퇴는","연가에서","어떻게","공제되나요"]},{"id":"nfaq_030","cat":"유연근무","q":"공동근무시간은 언제인가요?","a":"고용노동부 유연근무 지침상 공동근무시간은 10:00~12:00, 14:00~16:00입니다. 이 시간에는 모든 공무원이 근무해야 하며, 공동근무시간에는 원격근무를 제외한 유연근무 신청은 불가능합니다. 휴가 사용은 가능합니다.","source":"「유연근무제 세부운영지침」 개정본, 공동근무시간 운영, p.1","kw":["유연근무","공동근무시간은","언제인가요"]},{"id":"nfaq_031","cat":"유연근무","q":"공동근무시간 외에는 자유롭게 유연근무를 써도 되나요?","a":"공동근무시간 외 탄력시간에는 유연근무를 활용할 수 있습니다. 다만 원칙적으로 최소 근무인원은 현원의 30% 이상 유지해야 하며, 점검 등 부득이한 경우에는 예외가 인정될 수 있습니다.","source":"「유연근무제 세부운영지침」 개정본, 공동근무시간 운영, p.1","kw":["유연근무","공동근무시간","외에는","자유롭게","유연근무를","써도","되나요"]},{"id":"nfaq_032","cat":"유연근무","q":"시차출퇴근제는 몇 분 단위로 신청하나요?","a":"시차출퇴근제는 07:00~10:00까지 30분 단위로 출근유형을 정하여 사용하는 것이 원칙입니다. 기관 업무특성상 필요한 경우에는 10분 단위 운영도 가능하지만, 10분 미만의 분 단위 신청은 자제하도록 되어 있습니다.","source":"「유연근무제 세부운영지침」 개정본, 시차출퇴근형 최소 시간단위, p.1","kw":["유연근무","시차출퇴근제는","단위로","신청하나요"]},{"id":"nfaq_033","cat":"유연근무","q":"당일 유연근무 신청은 가능한가요?","a":"원칙적으로 유연근무는 사용 전날까지 신청하고 승인받는 것이 기준입니다. 다만 예상치 못한 사고·질병으로 가족돌봄이 필요한 상황, 기상악화, 비상상황 등 사전 신청 및 결재를 받기 어려운 사정이 발생한 경우에는 당일 유연근무 신청이 예외적으로 허용될 수 있습니다.\n\r\n원문 Q\u0026A 사례: 아이가 아프거나 등원이 늦어져 시차출퇴근제를 활용하려는 경우, 금요일 오후 늦게나 주말 중 아이 병원진료 등 사정이 생겨 월요일 오전 유연근무가 필요한 경우가 제시되어 있습니다.","source":"「유연근무제 세부운영지침」 개정본, 당일 유연근무 신청 승인기준, p.2, Q\u0026A 6, p.6","kw":["유연근무","당일","신청은","가능한가요"]},{"id":"nfaq_034","cat":"유연근무","q":"시간선택제공무원도 유연근무를 사용할 수 있나요?","a":"시간선택제공무원도 전일제와 동일하게 유연근무를 사용할 수 있습니다. 다만 근무일 자체를 바꾸는 것은 유연근무가 아니라 별도 인사발령 사항입니다.\n\r\n원문 예시: 월·수·금 09:00~14:00이 정상 근무일·시간인 시간선택제공무원은 월 08:30~13:30, 수 09:00~14:00, 금 10:00~15:00 등으로 유연근무를 활용할 수 있습니다. 그러나 월·화·수 또는 월·수 등으로 근무일을 바꾸는 것은 유연근무가 아니라 별도 인사발령 사항입니다.","source":"「유연근무제 세부운영지침」 개정본, 시간선택제공무원 유연근무, p.2","kw":["유연근무","시간선택제공무원도","유연근무를","사용할","있나요"]},{"id":"nfaq_035","cat":"유연근무","q":"공동근무시간에 육아시간을 쓸 수 있나요?","a":"가능합니다. 공동근무시간에는 유연근무 신청은 제한되지만 휴가 사용은 가능하고, 육아시간은 특별휴가의 한 종류이므로 공동근무시간에도 사용할 수 있습니다.","source":"「유연근무제 세부운영지침」 개정본, Q\u0026A 1 공동근무시간과 육아시간, p.3","kw":["유연근무","공동근무시간에","육아시간을","있나요"]},{"id":"nfaq_036","cat":"유연근무","q":"유연근무일에 출장을 가면 사무실에 꼭 복귀해야 하나요?","a":"출장이 예정된 날에는 유연근무를 하지 않는 것이 원칙입니다. 다만 유연근무일에 출장을 갔고 업무 종료 후 퇴근시간까지 사무실로 복귀하지 못하는 경우에는 부서장 보고로 출퇴근 지정을 갈음할 수 있습니다.","source":"「유연근무제 세부운영지침」 개정본, Q\u0026A 8 유연근무와 출장, p.7~8","kw":["유연근무","유연근무일에","출장을","가면","사무실에","복귀해야","하나요"]},{"id":"nfaq_037","cat":"유연근무","q":"공동근무시간을 지키기 어려운 개인 사정이 있으면 예외가 가능한가요?","a":"개인이 공동근무시간 준수가 어려운 불가피한 고충이 있는 경우에는 고충심사위원회에 고충심사청구를 할 수 있고, 위원회 심사를 통해 예외 인정 여부와 인정기간 등을 결정할 수 있습니다.\n\r\n원문 예시: 중증장애 자녀를 둔 부모가, 중증장애 자녀가 다니는 학교가 통상 매주 금요일 일찍 종료하고 여러 사정으로 부모가 하원을 할 수밖에 없어 금요일 공동근무시간을 준수하기 어려운 경우가 예시로 제시되어 있습니다.","source":"「유연근무제 세부운영지침」 개정본, 특이고충 인정 시 지침 일부 적용 예외, p.2","kw":["유연근무","공동근무시간을","지키기","어려운","개인","사정이","있으면","예외가","가능한가요"]},{"id":"nfaq_038","cat":"유연근무","q":"집약근무제를 쓰면 공동근무시간은 어떻게 적용되나요?","a":"공동근무시간은 근무일에 준수해야 하는 시간입니다. 집약근무제처럼 월~금이 모두 근무일이 아닌 경우, 근무일이 아닌 날에는 공동근무시간이 적용되지 않습니다. 따라서 공동근무시간 때문에 집약근무제를 사용할 수 없다고 보지는 않습니다. 다만 집약근무는 매일 출근하지 않아도 업무수행에 지장이 없는 경우에 승인되어야 하며, 부서장은 업무성과와 공무수행 지장 여부를 함께 판단해야 합니다.","source":"「유연근무제 세부운영지침」 개정본, Q\u0026A 2, p.4","kw":["유연근무","집약근무제를","쓰면","공동근무시간은","어떻게","적용되나요"]},{"id":"nfaq_039","cat":"유연근무","q":"시간선택제근무자는 공동근무시간을 모두 포함해서 근무해야 하나요?","a":"반드시 그렇지는 않습니다. 시간선택제근무자의 기본 근무시간은 기관의 업무형편과 인력운영상황 등을 고려하여 오전·오후 단위 등 다양한 형태로 정할 수 있고, 공동근무시간을 반드시 모두 포함해야 하는 것은 아닙니다.\n\r\n원문 예시: 월~금 10:00~15:00, 월~목 09:00~15:00 및 금 09:00~12:00, 월 11:00~16:00 및 화~금 10:00~15:00 형태가 가능 예시로 제시되어 있습니다.","source":"「유연근무제 세부운영지침」 개정본, Q\u0026A 3, p.4~5","kw":["유연근무","시간선택제근무자는","공동근무시간을","모두","포함해서","근무해야","하나요"]},{"id":"nfaq_040","cat":"유연근무","q":"시간선택제근무자도 공동근무시간에 육아시간을 사용할 수 있나요?","a":"사용할 수 있습니다. 시간선택제근무자도 공동근무시간에 육아시간이라는 특별휴가를 사용할 수 있습니다. 다만 시간선택제의 경우 모성보호시간 및 육아시간 사용 시 하루 최소근무시간이 3시간 이상이어야 하며, 이를 충족하지 못하면 연가로 처리됩니다.","source":"「유연근무제 세부운영지침」 개정본, Q\u0026A 4, p.5~6","kw":["유연근무","시간선택제근무자도","공동근무시간에","육아시간을","사용할","있나요"]},{"id":"nfaq_041","cat":"유연근무","q":"시간선택제근무자도 시차출퇴근제를 사용할 수 있나요?","a":"시간선택제근무자도 시차출퇴근제를 동시에 사용할 수 있습니다. 다만 당초 정한 시간선택제근로의 기본 근무시간에 포함된 공동근무시간은 준수해야 합니다.\n\r\n원문 예시: 시간선택제근무 지정 시 기본 근무시간이 09:00~14:00이고 그 안에 공동근무시간 10:00~12:00이 포함되어 있다면, 시차출퇴근제를 사용할 수는 있지만 10:00~12:00에는 반드시 근무해야 합니다.","source":"「유연근무제 세부운영지침」 개정본, Q\u0026A 5, p.6","kw":["유연근무","시간선택제근무자도","시차출퇴근제를","사용할","있나요"]},{"id":"nfaq_042","cat":"유연근무","q":"근무시간선택형으로 09:00~19:00 근무를 정할 수 있나요?","a":"가능합니다. 유연근무자의 저녁식사시간은 18:00~20:00 사이의 1시간을 원칙으로 합니다. 다만 09:00~19:00으로 근무시간을 정한 경우에는 점심시간 1시간만 공제하고 저녁시간은 공제하지 않으므로, 18:00~19:00에는 저녁식사시간 없이 근무해야 합니다. 09:00~20:00처럼 18:00~20:00 사이 유연근무 시간이 1시간을 초과하면 점심·저녁시간을 각각 1시간씩 공제해야 합니다.","source":"「유연근무제 세부운영지침」 개정본, Q\u0026A 7, p.7","kw":["유연근무","근무시간선택형으로","09:00~19:00","근무를","정할","있나요"]},{"id":"nfaq_043","cat":"초과근무","q":"초과근무수당 단가는 어디를 봐야 하나요?","a":"2026년 초과근무수당 단가는 「2026 공무원보수 등의 업무지침」 별표 2에서 직종·계급별로 확인합니다. 일반직 기준 시간외근무수당 시간당 단가는 5급 16,053원, 6급 13,692원, 7급 12,368원, 8급 12,113원, 9급 10,949원입니다.","source":"「2026 공무원보수 등의 업무지침」, 인사혁신처 예규 제204호(2026.1.22. 시행), 제7장 공무원수당 등의 업무 처리기준, [별표 2] 초과근무수당 지급단가, p.475","kw":["초과근무","초과근무수당","단가는","어디를","봐야","하나요"]},{"id":"nfaq_044","cat":"초과근무","q":"재택근무일에도 시간외근무수당 실적분을 받을 수 있나요?","a":"재택근무자에게는 재택근무일의 시간외근무수당 실적 지급분을 원칙적으로 지급하지 않습니다. 정액 지급분은 지급 가능합니다. 다만 「국가공무원 복무·징계 관련 예규」에 따라 부서장의 사전 긴급 초과근무명령으로 초과근무를 한 경우에는 실적 지급분 지급이 가능합니다.","source":"「2026 공무원보수 등의 업무지침」, 제7장 시간외근무수당 지급제외 대상자, p.423","kw":["초과근무","재택근무일에도","시간외근무수당","실적분을","받을","있나요"]},{"id":"nfaq_045","cat":"초과근무","q":"초과근무수당은 언제 지급되나요?","a":"초과근무수당은 초과근무를 한 다음 달의 보수지급일 또는 각 기관의 장이 정한 날 지급합니다. 12월분은 12월 31일까지 지급합니다.","source":"「2026 공무원보수 등의 업무지침」, 제7장 초과근무수당 지급방법, p.423","kw":["초과근무","초과근무수당은","언제","지급되나요"]},{"id":"nfaq_163","cat":"초과근무","q":"평일에는 18시부터 초과근무시간이 바로 인정되나요?","a":"일반근무자 기준으로 9시부터 18시까지 근무하는 경우, 평일 18시부터 19시까지는 초과근무시간으로 인정되지 않는다고 이해하면 됩니다. 평일 시간외근무는 실제 시간외근무시간에서 1시간을 공제하는 구조이므로, 예를 들어 18시부터 20시까지 근무하면 실제 인정시간은 1시간이 될 수 있습니다. 정확한 인정 여부는 e-사람 신청시간, 출퇴근 인증, 기관 내부 기준을 함께 확인하세요.","kw":["초과근무","평일에는","18시부터","초과근무시간이","바로","인정되나요","18시","19시","시간외근무","공제"],"source":"공무원수당 등에 관한 규정 제15조"},{"id":"nfaq_164","cat":"초과근무","q":"주말이나 공휴일에 59분 초과근무하면 인정되나요?","a":"토요일·공휴일 초과근무는 1시간 이상 근무해야 시간외근무시간으로 인정될 수 있습니다. 예를 들어 주말에 59분만 근무하면 그날의 초과근무시간은 0분으로 처리될 수 있습니다. 따라서 주말·휴일 근무 전에는 신청 시간과 실제 근무 가능 시간을 정확히 확인해야 합니다.","kw":["초과근무","주말이나","공휴일에","59분","초과근무하면","인정되나요","주말","공휴일","1시간"],"source":"공무원수당 등에 관한 규정 제15조"},{"id":"nfaq_165","cat":"초과근무","q":"초과근무는 분 단위까지 모두 인정되나요?","a":"초과근무시간은 매월 1일부터 말일까지 월 단위로 산정됩니다. 일별 시간외근무시간은 분 단위까지 합산될 수 있지만, 월별 최종 인정시간은 시간 단위로 처리되므로 1시간 미만의 분 단위는 버려질 수 있습니다. 예를 들어 월 합계가 24시간 59분이면 최종 인정시간은 24시간으로 처리될 수 있습니다.","kw":["초과근무","초과근무는","분","단위까지","모두","인정되나요","분단위","월단위","시간단위"],"source":"공무원수당 등에 관한 규정 제15조"},{"id":"nfaq_166","cat":"초과근무","q":"초과근무 중 잠깐 외부에 나갔다 오면 어떻게 하나요?","a":"초과근무 중 개인 용무, 외부 식사, 장시간 이석 등 실제로 근무하지 않은 시간이 있으면 e-사람에서 제외시간 등록이 필요할 수 있습니다. 출퇴근 인증 시간과 실제 근무시간이 다르면 초과근무 인정에 문제가 생길 수 있으므로 정확히 입력해야 합니다. 판단이 애매하면 사후에 임의 처리하지 말고 복무 또는 서무 담당자에게 먼저 확인하세요.","kw":["초과근무","중","잠깐","외부에","나갔다","오면","어떻게","하나요","제외시간","외부","이석"],"source":"2026 공무원보수 등의 업무지침, 국가공무원 복무규정"},{"id":"nfaq_046","cat":"출장·여비","q":"출장은 어디에서 신청하나요?","a":"e-사람에서 출장신청 메뉴를 사용합니다. 근무지내 출장과 근무지외 출장의 신청화면과 입력항목이 다르므로 출장지, 시간, 여비 여부, 결재선을 확인한 뒤 신청해야 합니다.","source":"「2026 슬기로운 고용노동부 생활」, 제1장 e-사람 활용법, 출장신청, p.21~25","kw":["출장·여비","출장은","어디에서","신청하나요"]},{"id":"nfaq_047","cat":"출장·여비","q":"근무지 내 국내출장은 어떤 출장인가요?","a":"근무지 내 국내출장은 같은 시·군 및 섬 안에서의 출장 또는 왕복거리 기준 여행거리가 12km 미만인 출장입니다. 구체적 여비 지급은 출장시간과 거리 등 여비기준에 따라 달라집니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 1~13, p.12~16, 「2026 공직을 여행하는 신규공무원을 위한 안내서」, 여비, p.40","kw":["출장·여비","근무지","국내출장은","어떤","출장인가요"]},{"id":"nfaq_048","cat":"출장·여비","q":"왕복 2km 이내 근거리 출장도 여비가 지급되나요?","a":"왕복 2km 이내 근거리 출장의 여비 지급은 「공무원 여비 100문 100답」의 해당 Q\u0026A 기준으로 처리해야 합니다. 단순히 “출장이면 무조건 지급”으로 보지 말고 출장거리와 시간, 지급제외 사유를 함께 확인해야 합니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 12, p.15","kw":["출장·여비","왕복","2km","이내","근거리","출장도","여비가","지급되나요"]},{"id":"nfaq_049","cat":"출장·여비","q":"자가용을 이용한 근무지외 출장 운임은 어떻게 보나요?","a":"자가용을 이용한 근무지외 출장의 운임 지급은 여비 기준상 별도 사례 판단이 필요합니다. 출발지, 근무지, 출장지, 거리 산정, 대중교통 이용 가능성, 통행료·주차료 증빙 여부를 확인해야 합니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 20~21, p.20~21","kw":["출장·여비","자가용을","이용한","근무지외","출장","운임은","어떻게","보나요"]},{"id":"nfaq_050","cat":"출장·여비","q":"통행료·주차비 영수증을 분실하면 어떻게 하나요?","a":"공무상 부득이하게 개인 차량을 이용한 출장에서 통행료·주차비 영수증을 분실한 경우에는 여비 100문100답의 해당 사례 기준으로 대체증빙 가능 여부를 검토해야 합니다. 사후에는 출장일시, 목적지, 경로, 지출사실을 객관적으로 확인할 자료를 확보하는 것이 안전합니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 26, p.22","kw":["출장·여비","통행료","주차비","영수증을","분실하면","어떻게","하나요"]},{"id":"nfaq_051","cat":"출장·여비","q":"재택근무 중 업무상 출장도 여비가 가능한가요?","a":"재택근무 중 업무상 부득이 출장이 필요한 경우에도 여비 지급 가능 여부는 공무상 출장명령과 여비 기준에 따라 판단합니다. 재택근무라는 사정만으로 여비 가능·불가능을 단정하지 말고 출장명령, 출발지, 출장지, 실제 이동을 확인해야 합니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 29, p.23","kw":["출장·여비","재택근무","업무상","출장도","여비가","가능한가요"]},{"id":"nfaq_052","cat":"출장·여비","q":"출장명령이 있으면 근무지 내 출장여비를 반드시 지급해야 하나요?","a":"출장명령에 따른 근무지 내 출장이라도 별도의 실비 발생 가능성이 없거나 정액보다 적게 소요되는 것이 명백한 경우에는 근무지 내 출장여비를 지급하지 않거나 감액하는 것이 타당할 수 있습니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 2, p.12","kw":["출장·여비","출장명령이","있으면","근무지","출장여비를","반드시","지급해야","하나요"]},{"id":"nfaq_053","cat":"출장·여비","q":"서무담당자가 근처 은행에 업무상 다녀오면 출장여비가 나오나요?","a":"업무와 관련하여 근처 은행 등을 방문하는 경우에는 근무지 내 출장으로 복무처리할 수 있습니다. 다만 별도의 실비 발생 가능성이 적은 단순 업무처리라면 실제 소요비용이 발생하지 않는 경우 근무지 내 출장여비를 지급하지 않아도 됩니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 3, p.12","kw":["출장·여비","서무담당자가","근처","은행에","업무상","다녀오면","출장여비가","나오나요"]},{"id":"nfaq_054","cat":"출장·여비","q":"운전원이 업무수행을 위해 차량을 운행하면 출장여비를 받나요?","a":"운전원이 본연의 업무수행을 위해 차량을 운행하는 경우에는 여비를 지급하지 않습니다. 다만 4시간 이상의 근무지 내 출장이고 실비 발생에 따른 여비 지급 필요성이 인정되는 경우에는 근무지 내 출장여비 지급을 검토할 수 있습니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 4, p.13","kw":["출장·여비","운전원이","업무수행을","위해","차량을","운행하면","출장여비를","받나요"]},{"id":"nfaq_055","cat":"출장·여비","q":"하루에 4시간 미만 근무지 내 출장을 여러 번 가면 여비는 어떻게 보나요?","a":"하루 동안 4시간 미만 근무지 내 출장을 여러 차례 다녀온 경우에는 각각을 따로만 볼 것이 아니라 같은 날의 출장 시간과 실제 소요비용, 지급기준을 함께 검토해야 합니다. 근무지 내 출장여비는 출장시간과 실비 발생 가능성에 따라 지급 여부가 달라질 수 있습니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 10~11, p.15","kw":["출장·여비","하루에","4시간","미만","근무지","출장을","여러","가면","여비는","어떻게","보나요"]},{"id":"nfaq_056","cat":"출장·여비","q":"근무지 외 국내출장에는 어떤 여비가 지급되나요?","a":"근무지 외 국내출장은 운임, 일비, 숙박비, 식비 등을 기준으로 봅니다. 근무지 내 국내출장은 별도의 여비 구분 없이 출장시간에 따라 정액으로 처리하는 반면, 근무지 외 국내출장은 실제 이동수단, 숙박 여부, 식사 제공 여부, 증빙자료에 따라 정산 방식이 달라집니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Ⅰ. 공무원 여비제도 개요, p.10, 「2026 공직을 여행하는 신규공무원을 위한 안내서」, 여비, p.40","kw":["출장·여비","근무지","국내출장에는","어떤","여비가","지급되나요"]},{"id":"nfaq_057","cat":"출장·여비","q":"관용차를 이용하면 출장여비가 달라지나요?","a":"관용차나 공용차량에 준하는 차량을 이용하면 일비가 감액될 수 있습니다. 출장 신청이나 정산 시 실제 이용한 교통수단을 정확히 입력해야 합니다. 다만 자가용 이용은 공용차량 이용이나 차량 임차와 다르므로, 자가용을 이용했다는 이유만으로 일비를 2분의 1 감액하지 않습니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 33, p.25","kw":["출장·여비","관용차를","이용하면","출장여비가","달라지나요"]},{"id":"nfaq_058","cat":"출장·여비","q":"자가용으로 근무지 외 출장을 가면 연료비는 어떻게 계산하나요?","a":"자가용 이용 출장의 연료비는 출발지부터 목적지까지의 도로 운행거리를 기준으로 산정합니다. 출발지는 원칙적으로 근무지입니다. 다만 집에서 직접 출발한 경우에는 근무지와 집 중 목적지에 가까운 쪽을 기준으로 계산합니다. 실제 연료 충전 영수증 금액을 그대로 지급하는 방식이 아니라 운행거리, 연비, 공표유가 등을 기준으로 산정합니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 20~21, Q\u0026A 32","kw":["출장·여비","자가용으로","근무지","출장을","가면","연료비는","어떻게","계산하나요"]},{"id":"nfaq_059","cat":"출장·여비","q":"출장 중 통행료·주차비는 어떤 증빙이 필요한가요?","a":"자가용 출장에서 통행료와 주차료를 지급받으려면 통행영수증과 주차영수증 등 증빙자료가 필요합니다. 하이패스나 신용카드로 결제한 경우에는 해당 사이트나 카드 사용내역을 출력해 증빙할 수 있습니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 32, p.25","kw":["출장·여비","출장","통행료","주차비는","어떤","증빙이","필요한가요"]},{"id":"nfaq_060","cat":"출장·여비","q":"출장 숙박비가 상한액을 넘으면 어떻게 하나요?","a":"숙박비는 원칙적으로 실비 상한액 범위에서 지급합니다. 다만 숙박시설 부족, 성수기 요금 부과 등 불가피한 사유가 있으면 상한액을 초과한 금액도 지급 검토가 가능합니다. 이 경우 숙박영수증과 함께 불가피한 사유를 소명할 자료를 첨부해야 합니다. 2박 이상 출장은 1박 단위로 상한액을 적용합니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 46~48, Q\u0026A 52~53","kw":["출장·여비","출장","숙박비가","상한액을","넘으면","어떻게","하나요"]},{"id":"nfaq_061","cat":"출장·여비","q":"출장 중 식사를 제공받으면 식비는 어떻게 계산하나요?","a":"출장 중 식사를 실비 또는 현물로 제공받은 경우에는 제공받은 끼니만큼 식비에서 감액합니다. 식비는 조식·중식·석식 기준으로 나누어 보며, 실제 제공받은 식사가 있으면 해당 부분을 중복 지급하지 않도록 정산해야 합니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 41~42","kw":["출장·여비","출장","식사를","제공받으면","식비는","어떻게","계산하나요"]},{"id":"nfaq_062","cat":"출장·여비","q":"신규채용자도 부임여비를 받을 수 있나요?","a":"신규채용자도 종전 거주지에서 신임지로 실제 이사를 하는 경우에는 부임여비 지급 대상이 될 수 있습니다. 핵심은 신규채용 자체가 아니라 인사발령을 계기로 실제 거주지를 이전했는지 여부입니다. 기존 거주지와 신임지가 같아 이사가 필요 없는 경우에는 부임여비 지급 대상이 아닙니다.\n\r\n원문 예시: 서울 소재 기관에 신규채용된 서울 거주자는 거주지 변경이 없으므로 부임여비 지급 대상이 아니지만, 서울 소재 기관에 신규채용된 부산 거주자가 부산에서 서울로 이사해야 하는 경우에는 부임여비 지급 대상이 될 수 있습니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 79","kw":["출장·여비","신규채용자도","부임여비를","받을","있나요"]},{"id":"nfaq_063","cat":"출장·여비","q":"허위 출장으로 여비를 받으면 어떻게 되나요?","a":"허위 출장으로 여비를 부당수령한 경우에는 부당수령액을 환수해야 합니다. 사안에 따라 징계처분 등 별도 책임이 문제될 수 있으므로, 출장 신청과 정산은 실제 출장 여부, 출장시간, 이동수단, 증빙자료를 기준으로 정확히 처리해야 합니다.","source":"「공무원 여비의 합리적 지출을 위한 100문 100답」, Q\u0026A 97","kw":["출장·여비","허위","출장으로","여비를","받으면","어떻게","되나요"]},{"id":"nfaq_064","cat":"급여·수당","q":"공무원 보수는 무엇으로 구성되나요?","a":"공무원 보수는 기본급인 봉급과 수당 등으로 구성됩니다. 수당체계에는 상여수당, 가계보전수당, 특수지근무수당, 특수근무수당, 초과근무수당 등, 실비변상 등이 포함됩니다.","source":"「2026 공무원보수 등의 업무지침」, 제7장 국가공무원 수당체계, p.346, 「공무원수당 등에 관한 규정」 제1조·제2조","kw":["급여·수당","공무원","보수는","무엇으로","구성되나요"]},{"id":"nfaq_065","cat":"급여·수당","q":"2026년 일반직 9급 1호봉 봉급은 얼마인가요?","a":"2026년 일반직 9급 1호봉 봉급은 월 2,133,000원입니다. 7급 1호봉은 월 2,317,100원, 8급 1호봉은 월 2,162,100원입니다. 이 금액은 봉급표상 월지급액이며, 실제 입금액은 수당·공제에 따라 달라집니다.","source":"「공무원보수규정」 [별표 3] 일반직공무원 등 봉급표","kw":["급여·수당","2026년","일반직","9급","1호봉","봉급은","얼마인가요"]},{"id":"nfaq_066","cat":"급여·수당","q":"명절휴가비는 얼마인가요?","a":"명절휴가비는 설날과 추석 지급기준일 현재 월봉급액의 60%를 연 2회 지급하는 수당입니다. 2026년 일반직 9급 1호봉의 월봉급액 2,133,000원을 기준으로 산출하면 1,279,800원입니다. 실제 지급 여부는 지급기준일 현재 재직상태, 휴직·직위해제·정직 여부, 승진일 등에 따라 달라질 수 있습니다.\n\r\n원문 예시: 설날이 2월 12일인 경우, 2월 12일 이전 신규채용자는 지급하고 2월 13일 이후 신규채용자는 지급하지 않습니다. 2월 13일 이후 퇴직자는 지급합니다. 2월 12일이 공무상 질병·부상 휴직을 제외한 휴직, 직위해제, 정직 기간에 포함되면 지급하지 않습니다. 2월 12일 이전 승진자는 승진된 계급·호봉의 월봉급액을 기준으로 하고, 2월 13일 이후 승진자는 승진 전 계급·호봉의 월봉급액을 기준으로 합니다.","source":"「2026 공무원보수 등의 업무지침」, 제7장 실비변상등-명절휴가비, p.429~430, 「공무원수당 등에 관한 규정」 제18조의3, 「공무원보수규정」 [별표 3]","kw":["급여·수당","명절휴가비는","얼마인가요"]},{"id":"nfaq_067","cat":"급여·수당","q":"정액급식비는 얼마인가요?","a":"2026년 공무원 수당체계 기준 정액급식비는 월 16만원입니다. 지급대상, 지급액, 지급시기는 공무원보수 등의 업무지침의 정액급식비 항목을 기준으로 확인합니다.","source":"「2026 공무원보수 등의 업무지침」, 국가공무원 수당체계 p.346, 정액급식비 p.429, 「공무원수당 등에 관한 규정」 제18조","kw":["급여·수당","정액급식비는","얼마인가요"]},{"id":"nfaq_068","cat":"급여·수당","q":"직급보조비는 얼마인가요?","a":"직급보조비는 직급별로 매월 지급되는 실비변상 성격의 수당입니다. 일반직 하위직급 기준으로 9급·8급은 월 175,000원, 7급은 월 180,000원, 6급은 월 185,000원, 5급은 월 250,000원입니다. 개인별 실제 반영 여부는 보수지급내역에서 확인해야 합니다.","source":"「2026 공무원보수 등의 업무지침」, 제7장 실비변상등-직급보조비, p.441~443, 「공무원수당 등에 관한 규정」 제18조의6 및 [별표 15]","kw":["급여·수당","직급보조비는","얼마인가요"]},{"id":"nfaq_069","cat":"급여·수당","q":"가족수당은 누구에게 지급되나요?","a":"가족수당은 부양가족이 있는 공무원에게 지급됩니다. 기본요건은 부양의무를 가진 공무원과 주민등록표상 세대를 같이 하고, 해당 공무원의 주소 또는 거소에서 실제 생계를 같이 하며, 규정상 부양가족 범위에 해당해야 한다는 점입니다.","source":"「2026 공무원보수 등의 업무지침」, 가족수당, p.364, 「공무원수당 등에 관한 규정」 제10조","kw":["급여·수당","가족수당은","누구에게","지급되나요"]},{"id":"nfaq_070","cat":"급여·수당","q":"가족수당 금액은 얼마인가요?","a":"가족수당은 배우자 월 40,000원, 배우자 및 자녀를 제외한 부양가족 1명당 월 20,000원입니다. 자녀는 첫째 월 50,000원, 둘째 월 80,000원, 셋째 이후 월 120,000원입니다.","source":"「2026 공무원보수 등의 업무지침」, 가족수당 지급액, p.365, 「공무원수당 등에 관한 규정」 제10조 및 [별표 5]","kw":["급여·수당","가족수당","금액은","얼마인가요"]},{"id":"nfaq_071","cat":"급여·수당","q":"정근수당은 어떤 수당인가요?","a":"정근수당은 근무연수에 따라 1월과 7월에 지급되는 상여수당입니다. 2026년 보수업무지침상 정근수당은 월봉급액의 10~50% 범위에서 연 2회 지급하는 수당으로 정리되어 있습니다. 주요 구간은 2년 미만 10%, 5년 미만 20%, 6년 미만 25%, 7년 미만 30%, 8년 미만 35%, 9년 미만 40%, 10년 미만 45%, 10년 이상 50%로 확인합니다. 실제 지급 여부는 지급대상기간 중 징계·직위해제·휴직 등 감액 또는 제외 사유를 함께 봐야 합니다.","source":"「2026 공무원보수 등의 업무지침」, 국가공무원 수당체계 p.346, 정근수당 p.353~357, 「공무원수당 등에 관한 규정」 제7조 및 [별표 2]","kw":["급여·수당","정근수당은","어떤","수당인가요"]},{"id":"nfaq_072","cat":"급여·수당","q":"성과상여금은 모두 같은 금액을 받나요?","a":"아닙니다. 성과상여금은 지급기준액과 지급등급 등에 따라 차등 지급되는 상여수당입니다. 수당체계상 지급기준액의 0~172.5% 범위로 정리되어 있고, 세부 처리기준은 공무원보수 등의 업무지침 제8장 성과상여금 업무처리기준을 확인해야 합니다.","source":"「2026 공무원보수 등의 업무지침」, 제7장 국가공무원 수당체계, p.346, 제8장 성과상여금 업무처리기준, p.491~496","kw":["급여·수당","성과상여금은","모두","같은","금액을","받나요"]},{"id":"nfaq_073","cat":"급여·수당","q":"육아휴직수당은 어느 근거를 봐야 하나요?","a":"육아휴직수당은 공무원수당규정 제11조의3과 「2026 공무원보수 등의 업무지침」 제7장 육아휴직수당 항목을 기준으로 봅니다. 지급대상, 지급액, 지급기간, 지급방법이 별도로 정해져 있으므로 단순히 월봉급액만으로 판단하지 않습니다.","source":"「2026 공무원보수 등의 업무지침」, 육아휴직수당, p.382~390, 「공무원수당 등에 관한 규정」 제11조의3","kw":["급여·수당","육아휴직수당은","어느","근거를","봐야","하나요"]},{"id":"nfaq_074","cat":"급여·수당","q":"급여명세서는 어디서 확인하나요?","a":"e-사람의 나의 소득 메뉴에서 본인의 급여, 원천징수, 계좌번호 등을 확인합니다. 실제 지급·공제 내역은 해당 월 보수지급내역에서 항목별로 확인해야 합니다.","source":"「2026 슬기로운 고용노동부 생활」, 제1장 e-사람 활용법, 나의 소득, p.65","kw":["급여·수당","급여명세서는","어디서","확인하나요"]},{"id":"nfaq_075","cat":"급여·수당","q":"호봉은 어떻게 처음 정해지나요?","a":"신규채용자의 초임호봉은 경력환산율표 적용, 계급별 경력기간 계산, 호봉경력 평가·심의, 초임호봉 획정 순서로 처리합니다. 호봉합산 대상경력이 있으면 경력기간 합산신청서와 증빙자료가 필요합니다.","source":"「2026 공무원보수 등의 업무지침」, 제1장 공무원 봉급업무 처리기준, 초임호봉 획정, p.6~8","kw":["급여·수당","호봉은","어떻게","처음","정해지나요"]},{"id":"nfaq_076","cat":"민원","q":"타 기관 민원은 언제 이송해야 하나요?","a":"민원내용이 완전히 다른 기관 업무인 경우 소관기관과 사유를 입력하여 8근무시간 내 해당 기관에 직접 이송합니다. 이송사유는 구체적 근거를 적고, 개인정보 처리에 유의해야 합니다. 자세한 내용은 좌측의 📄 민원 답변 문안 게시판을 참고해주세요.\n\r\n원문 작성례: “이 민원은 OOO법 위반 여부에 대한 조사를 요구하는 내용에 해당하므로 동 법률에 따른 조사 소관 기관인 ◇◇도 △△시로 이송을 원합니다.”","source":"「국민신문고」 민원 처리시 준수사항(4차 개정), Ⅱ-1 민원 접수 및 배정, p.2, 민원서비스 종합평가 관련 국민신문고 처리 시 유의사항, p.1","kw":["민원","기관","민원은","언제","이송해야","하나요"]},{"id":"nfaq_077","cat":"민원","q":"다부처 민원은 무엇인가요?","a":"다부처 민원은 2개 이상의 행정기관과 관련되어 각 기관에서 독립적으로 처리해야 하는 사안이 포함된 민원입니다. 지정 대상 기관과 지정사유를 충실히 작성해야 하며, 불필요한 기관 간 갈등이 생기지 않도록 신중히 판단해야 합니다.","source":"「국민신문고」 민원 처리시 준수사항(4차 개정), Ⅱ-1 신중한 다부처 민원 지정 요청, p.3","kw":["민원","다부처","민원은","무엇인가요"]},{"id":"nfaq_078","cat":"민원","q":"협조처리 민원은 언제 쓰나요?","a":"협조처리는 하나의 민원 안에 다른 부서 또는 기관의 의견이 필요한 경우 사용하는 방식입니다. 소관을 단순히 떠넘기는 용도로 쓰면 안 되고, 협조가 필요한 부분과 사유를 명확히 해야 합니다.","source":"「국민신문고」 민원 처리시 준수사항(4차 개정), Ⅱ-1 협조처리 민원 관련 사항, p.4","kw":["민원","협조처리","민원은","언제","쓰나요"]},{"id":"nfaq_079","cat":"민원","q":"핑퐁 민원은 왜 문제인가요?","a":"핑퐁 민원은 기관이나 부서 간에 민원이 반복적으로 오가면서 처리 지연과 2차 민원을 유발할 수 있습니다. 준수사항은 업무소관을 접수단계에서 철저히 확인하고 무분별한 이송을 지양하도록 합니다.","source":"「국민신문고」 민원 처리시 준수사항(4차 개정), Ⅱ-1 민원 접수 및 배정, p.2~4","kw":["민원","핑퐁","민원은","문제인가요"]},{"id":"nfaq_080","cat":"민원","q":"기피신청 민원은 어떻게 처리해야 하나요?","a":"기피신청 민원은 민원인의 의사반영 여부와 기피사유 해당 여부를 구분하여 처리해야 합니다. 불수용하는 경우에도 기피민원 사유 해당 여부와 세부사유를 입력해야 하므로, 단순히 기존 담당자에게 그대로 배정하면 위험합니다. 자세한 내용은 좌측의 📄 민원 답변 문안 게시판을 참고해주세요.","source":"「국민신문고」 민원 처리시 준수사항(4차 개정), Ⅱ-1 기피신청 민원 관련 사항, p.5","kw":["민원","기피신청","민원은","어떻게","처리해야","하나요"]},{"id":"nfaq_081","cat":"민원","q":"국민신문고 답변은 어떻게 구조화해야 하나요?","a":"민원 답변은 민원요지를 정확히 적고, 각 민원요지별로 누락 없이 답변해야 합니다. “향후 참고하겠습니다”, “유선으로 안내드린 바와 같습니다”처럼 실질 답변 없이 종결하는 표현은 부적절합니다. 답변은 가-나-다, 1-2-3, ○- 형태 등으로 구분·구조화하여 민원인이 읽기 쉽게 작성해야 합니다. 자세한 내용은 좌측의 📄 민원 답변 문안 게시판을 참고해주세요.","source":"「국민신문고」 민원 처리시 준수사항(4차 개정), Ⅱ-3 민원 처리 결과 통보, p.13, 민원서비스 종합평가 관련 국민신문고 처리 시 유의사항, p.2","kw":["민원","국민신문고","답변은","어떻게","구조화해야","하나요"]},{"id":"nfaq_082","cat":"민원","q":"오프라인 접수 민원은 국민신문고와 다르게 처리하나요?","a":"우편·방문 등 오프라인 민원도 온라인 민원과 동일하게 처리받을 수 있도록 연락처를 확인하고, 미기재 시 보완 요구를 해야 합니다. 서신 등으로 접수되어 국민신문고에 등록된 민원은 민원인이 시스템에서 조회하기 어려우므로 서신으로 처리결과를 통보하는 것이 원칙입니다.","source":"「국민신문고」 민원 처리시 준수사항(4차 개정), 개정 배경 p.1, Ⅳ 우편·방문 등 오프라인 민원 처리, p.20~23","kw":["민원","오프라인","접수","민원은","국민신문고와","다르게","처리하나요"]},{"id":"nfaq_083","cat":"민원","q":"민원인이 문서회신을 요구하면 어떻게 하나요?","a":"문서회신 요구가 있는 경우 국민신문고 답변 처리 시 서신통보 확인란과 e-그린우편 활용 여부를 확인해야 합니다. 전자결재 연계 후 처리결과 통보까지 완료하고, 시행문 파일 첨부 누락 여부를 확인해야 합니다.","source":"민원서비스 종합평가 관련 국민신문고 처리 시 유의사항, p.1, 「국민신문고」 민원 처리시 준수사항(4차 개정), p.9~12","kw":["민원","민원인이","문서회신을","요구하면","어떻게","하나요"]},{"id":"nfaq_084","cat":"민원","q":"불만족 민원이 들어오면 꼭 추가답변해야 하나요?","a":"민원서비스 종합평가 유의사항은 추가 답변율을 평가하는 것이 아니라, 민원인의 만족도 평가 결과를 30일 이내 확인하고 “만족도 확인 등록” 버튼을 누른 비율을 평가한다고 설명합니다. 다만 불만족 내용을 검토하여 필요한 경우 추가답변을 하는 것이 민원관리상 안전합니다.","source":"민원서비스 종합평가 관련 국민신문고 처리 시 유의사항, p.1, 「국민신문고」 민원 처리시 준수사항(4차 개정), Ⅱ-4 민원 사후관리, p.14~16","kw":["민원","불만족","민원이","들어오면","추가답변해야","하나요"]},{"id":"nfaq_085","cat":"민원","q":"대통령비서실 이첩 민원은 별도 유의사항이 있나요?","a":"대통령비서실에서 이첩된 민원은 국민신문고 준수사항의 별도 장에서 처리방법을 정하고 있습니다. 일반 국민신문고 민원과 처리흐름이 다를 수 있으므로 해당 장의 절차와 통보 문안을 확인해야 합니다.","source":"「국민신문고」 민원 처리시 준수사항(4차 개정), Ⅲ 대통령비서실에서 이첩된 민원 처리, p.17~19","kw":["민원","대통령비서실","이첩","민원은","별도","유의사항이","있나요"]},{"id":"nfaq_086","cat":"민원","q":"외국인이 제출한 국민신문고 민원은 어떻게 처리하나요?","a":"외국인이 제출한 민원이라도 요건과 내용이 관련 법령 등에 부합하면 내국인과 동일하게 처리될 수 있도록 조치해야 합니다. 외국어 민원의 경우 국민신문고 자동 번역 서비스 이용이 권장됩니다.","source":"「국민신문고」 민원 처리시 준수사항(4차 개정), 개정 배경 p.1, Ⅴ 국민신문고를 이용한 외국인 민원의 처리, p.24~25","kw":["민원","외국인이","제출한","국민신문고","민원은","어떻게","처리하나요"]},{"id":"nfaq_087","cat":"민원","q":"소극행정 신고 민원은 일반 민원과 같나요?","a":"소극행정 신고 민원은 국민신문고 준수사항에서 별도 장으로 다룹니다. 접수·분류·처리결과 통보 시 소극행정 해당 여부와 처리절차를 확인해야 하며, 일반 질의민원처럼 단순 답변으로 종결하면 안 되는 경우가 있습니다.","source":"「국민신문고」 민원 처리시 준수사항(4차 개정), Ⅸ 소극행정 신고 민원 처리, p.30~32","kw":["민원","소극행정","신고","민원은","일반","민원과","같나요"]},{"id":"nfaq_088","cat":"민원","q":"신고성 민원은 무엇을 조심해야 하나요?","a":"신고성 민원은 신고자·피신고자 개인정보, 조사자료, 답변 공개범위가 민감합니다. 국민신문고 준수사항의 신고성 민원 처리 장과 개인정보 보호 유의사항을 함께 확인해 비공개 지정과 문서제목 공개 여부를 점검해야 합니다.","source":"「국민신문고」 민원 처리시 준수사항(4차 개정), Ⅹ 신고성 민원 처리, p.33~35, 붙임2 개인정보 보호 유의사항, p.39~41","kw":["민원","신고성","민원은","무엇을","조심해야","하나요"]},{"id":"nfaq_089","cat":"개인정보","q":"민원인의 전화번호를 다른 직원에게 전달해도 되나요?","a":"민원처리를 위해 다른 직원에게 민원인의 연락처 등 개인정보를 제공하는 경우에도 처리 목적상 필요한 범위인지 확인해야 합니다. 개인정보 제공은 업무 편의가 아니라 민원처리에 필요한 범위에서 최소화해야 합니다.","source":"「개인정보 질의응답 모음집」, 개인정보보호위원회, Q33, p.42","kw":["개인정보","민원인의","전화번호를","다른","직원에게","전달해도","되나요"]},{"id":"nfaq_090","cat":"개인정보","q":"개인정보가 포함된 국민신문고 답변은 공개해도 되나요?","a":"국민신문고 준수사항은 개인정보가 포함된 민원답변, 신고·고발·제보성 민원답변, 기피신청 민원답변, 서신통보 답변 등을 비공개 대상으로 정하고 있습니다. 답변 내용뿐 아니라 문서제목에 개인정보가 포함되지 않도록 해야 합니다.","source":"「국민신문고」 민원 처리시 준수사항(4차 개정), 붙임2 개인정보 보호 유의사항, p.39~41","kw":["개인정보","개인정보가","포함된","국민신문고","답변은","공개해도","되나요"]},{"id":"nfaq_091","cat":"개인정보","q":"주민등록번호는 민원처리에 필요하면 자유롭게 받을 수 있나요?","a":"주민등록번호 등 고유식별정보는 법령상 근거와 업무상 불가피성이 있어야 처리할 수 있습니다. 필요하다는 이유만으로 광범위하게 수집하지 말고, 해당 사무의 법적 근거와 대체수단을 확인해야 합니다.","source":"「개인정보 질의응답 모음집」 Q83, p.96 / 「개인정보 보호법」 제24조(고유식별정보의 처리 제한)·제24조의2(주민등록번호 처리의 제한)","kw":["개인정보","주민등록번호는","민원처리에","필요하면","자유롭게","받을","있나요"]},{"id":"nfaq_092","cat":"개인정보","q":"정보공개청구로 개인정보가 요청되면 어떻게 하나요?","a":"정보공개청구에 개인정보가 포함되어 있으면 공개·비공개 대상 정보를 구분해야 합니다. 공개대상 정보와 비공개대상 정보가 혼합되어 있으면 비공개 부분을 가리고 부분공개하는 것이 원칙입니다.","source":"「고용노동부 정보공개에 관한 규정」 제3조, p.1, 「개인정보 질의응답 모음집」, Q40, p.49","kw":["개인정보","정보공개청구로","개인정보가","요청되면","어떻게","하나요"]},{"id":"nfaq_171","cat":"개인정보","q":"개인정보가 포함된 출력물은 어떻게 처리해야 하나요?","a":"주민등록번호, 연락처, 계좌번호, 민원인 정보가 포함된 출력물은 프린터에 방치하지 말고 즉시 회수하세요. 잘못 출력했거나 불필요해진 문서는 일반 휴지통이 아니라 보안 파쇄 절차에 따라 처리해야 합니다. 공용 프린터를 사용할 때는 출력 전 프린터명을 확인하고, 다른 사람의 개인정보 문서를 실수로 가져가지 않도록 주의하세요.","kw":["개인정보","개인정보가","포함된","출력물은","어떻게","처리해야","하나요","출력물","파쇄","프린터"]},{"id":"nfaq_172","cat":"개인정보","q":"브라우저에 업무시스템 비밀번호를 저장해도 되나요?","a":"업무용 PC에서 브라우저가 비밀번호 저장을 제안하더라도 업무시스템 비밀번호를 저장하지 않는 것이 안전합니다. 특히 공용 PC, 회의실 PC, 다른 사람이 사용할 수 있는 PC에서는 저장된 비밀번호가 보안 사고로 이어질 수 있습니다. 비밀번호는 포스트잇, 메모장, 브라우저 자동저장에 남기지 말고 기관의 보안 기준에 맞게 관리하세요.","kw":["개인정보","브라우저에","업무시스템","비밀번호를","저장해도","되나요","브라우저","비밀번호","자동저장","보안"]},{"id":"nfaq_093","cat":"정보공개","q":"정보공개는 보유하지 않은 정보도 만들어서 줘야 하나요?","a":"아닙니다. 고용노동부 정보공개 규정은 청구된 정보를 공개할 때 현재 보유·관리하고 있는 정보를 대상으로 해야 하며, 일부를 발췌·요약하는 등 별도로 가공된 형태로 공개해서는 안 된다고 정합니다. 다만 있는 그대로 공개하는 것이 큰 업무부담을 유발하고 청구인이 가공에 동의한 경우에는 가공 공개가 가능합니다.","source":"「고용노동부 정보공개에 관한 규정」 제3조 제3항, p.1","kw":["정보공개","정보공개는","보유하지","않은","정보도","만들어서","줘야","하나요"]},{"id":"nfaq_094","cat":"정보공개","q":"비공개 정보가 일부 섞이면 전체 비공개인가요?","a":"아닙니다. 공개·비공개가 혼합된 정보는 비공개 부분을 가리고 공개해야 하며, 부분적으로 비공개대상 정보가 포함되어 있다는 이유만으로 전체를 비공개해서는 안 됩니다.","source":"「고용노동부 정보공개에 관한 규정」 제3조 제2항, p.1","kw":["정보공개","비공개","정보가","일부","섞이면","전체","비공개인가요"]},{"id":"nfaq_095","cat":"정보공개","q":"정보공개 처리부서는 어떻게 정하나요?","a":"정보공개의 처리부서는 대상정보를 실질적으로 취급하는 부서입니다. 처리부서가 불명확하거나 여러 부서가 관련된 경우에는 정보공개책임관이 처리부서를 지정합니다.","source":"「고용노동부 정보공개에 관한 규정」 제5조 제2항, p.2","kw":["정보공개","처리부서는","어떻게","정하나요"]},{"id":"nfaq_096","cat":"정보공개","q":"정보공개청구는 며칠 안에 결정해야 하나요?","a":"정보공개 여부는 청구를 받은 날부터 10일 이내에 결정하는 것이 원칙입니다. 부득이한 사유로 10일 이내 결정할 수 없는 경우에는 10일의 범위에서 연장할 수 있고, 연장 사유를 청구인에게 지체 없이 문서로 통지해야 합니다. 기간 계산은 정보공개 운영 안내서의 기간 계산 기준을 함께 확인해야 하며, 토요일·공휴일 포함 여부 등은 해당 안내서의 “정보공개 관련 각종 기간의 계산 방법”을 기준으로 처리합니다.","source":"「고용노동부 정보공개에 관한 규정」 제14조, p.5, 「2021 정보공개 운영 안내서」, 정보공개 관련 각종 기간의 계산 방법, p.67","kw":["정보공개","정보공개청구는","며칠","안에","결정해야","하나요"]},{"id":"nfaq_097","cat":"정보공개","q":"정보공개청구 기관을 잘못 받은 경우 어떻게 하나요?","a":"공공기관이 보유·관리하지 않는 정보나 소관이 다른 정보는 부존재 처리 또는 이송 여부를 정보공개법 처리절차에 따라 검토해야 합니다. 단순 민원회신으로 돌리기 전에 정보공개 운영 안내서의 이송·부존재 처리 기준을 확인해야 합니다.","source":"「2021 정보공개 운영 안내서」, 제3장 정보공개업무 처리절차, Q031~Q034, p.60~63","kw":["정보공개","정보공개청구","기관을","잘못","받은","경우","어떻게","하나요"]},{"id":"nfaq_098","cat":"문서·결재","q":"공문서는 언제 성립하고 효력이 발생하나요?","a":"공문서는 권한 있는 자의 결재가 있어야 성립합니다. 효력 발생은 문서의 종류와 상대방 도달 여부 등에 따라 달라지므로, 기안·결재·시행 과정을 구분해야 합니다.","source":"「2025 행정업무운영 편람」, 제2장 제1절 문서의 성립과 효력 발생, p.28~31","kw":["문서·결재","공문서는","언제","성립하고","효력이","발생하나요"]},{"id":"nfaq_099","cat":"문서·결재","q":"공문서 작성의 일반원칙은 무엇인가요?","a":"문서는 쉽고 정확하게 작성해야 하며, 행정업무의 처리 목적과 수신자가 이해할 수 있도록 명확하게 표현해야 합니다. 맞춤법·어법뿐 아니라 문서의 성격에 맞는 형식과 용어 사용이 중요합니다.","source":"「2025 행정업무운영 편람」, 문서작성 및 처리의 일반원칙, p.32~48, 「2026 슬기로운 고용노동부 생활」, 제5장 공문서 작성법, p.180~189","kw":["문서·결재","공문서","작성의","일반원칙은","무엇인가요"]},{"id":"nfaq_100","cat":"문서·결재","q":"공문서의 구성 체계는 어떻게 보나요?","a":"공문서는 두문, 본문, 결문 등 정해진 구성 체계를 따릅니다. 제목, 수신, 시행문, 붙임, 발신명의 등 문서 요소별 위치와 의미를 확인해야 합니다.","source":"「2025 행정업무운영 편람」, 문서의 구성 체계, p.54~64, 「2026 슬기로운 고용노동부 생활」, 제5장 공문서 작성법, p.195~202","kw":["문서·결재","공문서의","구성","체계는","어떻게","보나요"]},{"id":"nfaq_101","cat":"문서·결재","q":"기안은 무엇인가요?","a":"기안은 행정기관의 의사를 결정하기 위하여 문안을 작성하고 결재를 요청하는 절차입니다. 내부결재 문서와 대외시행 문서는 목적과 결재·시행 방식이 다르므로 구분해야 합니다.","source":"「2025 행정업무운영 편람」, 문서의 기안, p.65~90, 「2026 슬기로운 고용노동부 생활」, 제3장 온나라 활용법, p.130~141","kw":["문서·결재","기안은","무엇인가요"]},{"id":"nfaq_102","cat":"문서·결재","q":"검토와 협조는 언제 필요한가요?","a":"문서 내용이 다른 부서의 업무와 관련되거나 전문적 검토가 필요한 경우 검토·협조 절차를 거칩니다. 협조는 책임을 전가하는 절차가 아니라 관련 부서 의견을 문서 처리 전에 반영하기 위한 절차입니다.","source":"「2025 행정업무운영 편람」, 검토 및 협조, p.91~95","kw":["문서·결재","검토와","협조는","언제","필요한가요"]},{"id":"nfaq_103","cat":"문서·결재","q":"결재는 왜 중요한가요?","a":"결재는 행정기관의 의사를 결정하는 핵심 절차입니다. 결재권자, 전결·대결 여부, 결재선 지정이 문서의 성립과 책임소재에 영향을 주므로 문서 성격에 맞게 결재선을 설정해야 합니다.","source":"「2025 행정업무운영 편람」, 결재, p.96~101, 「2026 슬기로운 고용노동부 생활」, 온나라 결재라인 자동설정, p.151~153","kw":["문서·결재","결재는","중요한가요"]},{"id":"nfaq_104","cat":"문서·결재","q":"문서 시행은 무엇인가요?","a":"문서 시행은 결재가 끝난 문서를 수신자에게 발송하거나 알리는 절차입니다. 대외시행 문서는 시행문과 붙임, 수신자, 발신명의, 공개 여부 등을 확인해야 합니다.","source":"「2025 행정업무운영 편람」, 문서의 시행, p.105~112, 「2026 슬기로운 고용노동부 생활」, 대내외시행 문서, p.130~135","kw":["문서·결재","문서","시행은","무엇인가요"]},{"id":"nfaq_105","cat":"문서·결재","q":"접수문서는 어떻게 처리하나요?","a":"접수문서는 접수 후 처리담당자 배부, 검토, 처리, 회신 등 절차를 거칩니다. 처리기한이 있는 문서는 접수일과 기한을 먼저 확인하고, 소관이 아닌 경우에는 재배부·이송 절차를 신속히 검토해야 합니다.","source":"「2025 행정업무운영 편람」, 문서의 접수 및 처리, p.113~119","kw":["문서·결재","접수문서는","어떻게","처리하나요"]},{"id":"nfaq_106","cat":"문서·결재","q":"업무 인계·인수는 어떻게 해야 하나요?","a":"조직개편, 인사발령, 업무분장 조정 등으로 업무를 인계·인수할 때에는 해당 업무에 관한 모든 사항이 구체적으로 나타나도록 업무관리시스템이나 전자문서시스템을 이용해 인계·인수해야 합니다.","source":"「2025 행정업무운영 편람」, 업무의 분장 및 인계·인수, p.245~258, 「2026 공직을 여행하는 신규공무원을 위한 안내서」, p.6","kw":["문서·결재","업무","인계","인수는","어떻게","해야","하나요"]},{"id":"nfaq_107","cat":"문서·결재","q":"업무편람은 왜 필요한가요?","a":"업무편람은 담당자가 바뀌어도 업무가 일관되게 처리되도록 업무 절차, 기준, 유의사항을 정리한 자료입니다. 업무 흐름, 처리기준, 담당자, 관련 서식, 자주 발생하는 오류를 함께 정리하면 인계·인수와 신규자 적응에 도움이 됩니다.","source":"「2025 행정업무운영 편람」, 업무편람의 작성·활용, p.259~261","kw":["문서·결재","업무편람은","필요한가요"]},{"id":"nfaq_167","cat":"문서·결재","q":"우편·등기·문서수발은 어디서 확인해야 하나요?","a":"공문 발송, 등기 수령, 우편물 배부가 어디에서 이루어지는지 첫 주에 확인하세요. 문서수발함 위치, 등기 수령 방식, 부재 시 처리 방법, 외부 발송 절차를 알아두면 민원서류나 중요 문서를 놓치는 일을 줄일 수 있습니다. 등기나 민원서류는 처리기한과 연결될 수 있으므로 “내 자리에 없었다”는 이유로 방치되지 않도록 문서 흐름을 먼저 파악해야 합니다.","kw":["문서·결재","우편","등기","문서수발은","어디서","확인해야","하나요","문서수발"]},{"id":"nfaq_168","cat":"문서·결재","q":"정례보고나 반복 마감일은 어떻게 관리해야 하나요?","a":"매주, 매월, 분기마다 반복되는 보고나 제출 기한은 개인 캘린더에 미리 등록하세요. 신규자는 업무 내용을 몰라서 실수하기보다 마감일을 놓쳐서 지적받는 경우가 많습니다. 반복 업무의 제출 주기, 제출처, 작성 파일명, 전년도 제출자료 위치를 먼저 파악해두면 업무 부담이 크게 줄어듭니다.","kw":["문서·결재","정례보고나","반복","마감일은","어떻게","관리해야","하나요","정례보고","마감일","캘린더"]},{"id":"nfaq_169","cat":"문서·결재","q":"전임자 파일을 그대로 사용해도 되나요?","a":"전임자 파일은 참고자료일 뿐입니다. 그대로 믿고 사용하지 말고 법령, 지침, 서식, 담당자, 제출기한, 금액, 계좌, 수신처, 시행일자가 현재 기준과 맞는지 확인해야 합니다. 특히 법령 조문, 예산 단가, 신청서 서식, 담당 부서명은 바뀌었을 가능성이 있으므로 실제 처리 전 최신 기준을 한 번 더 확인하세요.","kw":["문서·결재","전임자","파일을","그대로","사용해도","되나요","파일","최신성"]},{"id":"nfaq_170","cat":"문서·결재","q":"업무별 문의처는 어떻게 정리해두면 좋나요?","a":"업무를 하다 보면 누구에게 물어봐야 하는지 몰라 시간이 지체되는 경우가 많습니다. 담당 업무별로 자주 묻는 사람, 서무 담당자, 전산 담당자, 복무 담당자, 회계 담당자, 문서수발 담당자 연락처를 개인 메모로 정리해두세요. 다만 단순히 넘겨 묻기보다 본인이 어디까지 확인했고 어느 부분이 막혔는지 함께 설명하는 습관이 필요합니다.","kw":["문서·결재","업무별","문의처는","어떻게","정리해두면","좋나요","문의처","서무","전산","복무","회계"]},{"id":"nfaq_108","cat":"교육·배우리","q":"상시학습 운영지침의 적용대상은 누구인가요?","a":"상시학습 운영지침은 고용노동부와 그 소속기관의 4급 이하 일반직 공무원에게 적용됩니다.","source":"「교육훈련시간 승진반영제도(상시학습) 운영지침」, 고용노동부훈령 제427호, Ⅰ. 총칙 2. 적용대상, p.1","kw":["교육·배우리","상시학습","운영지침의","적용대상은","누구인가요"]},{"id":"nfaq_109","cat":"교육·배우리","q":"필요 교육훈련시간을 못 채우면 어떻게 되나요?","a":"필요 교육훈련시간을 충족하지 못한 공무원은 승진심사 대상에서 제외됩니다. 다만 승진심사 배수에는 포함됩니다.","source":"「교육훈련시간 승진반영제도(상시학습) 운영지침」, Ⅱ. 교육훈련시간의 승진 반영방법, p.1","kw":["교육·배우리","필요","교육훈련시간을","채우면","어떻게","되나요"]},{"id":"nfaq_110","cat":"교육·배우리","q":"필수교육과정을 이수하지 못하면 어떻게 되나요?","a":"매 연도 인재개발계획에서 정한 필수교육과정을 당해 직급에서 최소 2개 이상 이수하지 못한 공무원은 필요 교육훈련시간을 충족하지 못한 것으로 봅니다. 여기서 핵심은 “매년 2개”가 아니라 “당해 직급에서 최소 2개”라는 점입니다. 예를 들어 본인이 7급이라면 7급 재직기간 중 필수교육과정 최소 2개 이수 여부를 확인해야 합니다.","source":"「교육훈련시간 승진반영제도(상시학습) 운영지침」, Ⅱ. 교육훈련시간의 승진 반영방법, p.1~2","kw":["교육·배우리","필수교육과정을","이수하지","못하면","어떻게","되나요"]},{"id":"nfaq_111","cat":"교육·배우리","q":"지정학습은 얼마나 이수해야 하나요?","a":"해당 연도에 이수해야 할 연간 교육훈련시간의 40% 이상을 지정학습으로 이수해야 합니다. 예를 들어 행정직군은 연간 교육훈련시간 80시간 중 지정학습 32시간 이상, 방호·운전직렬은 연간 24시간 중 지정학습 10시간 이상, 관리운영직군은 연간 40시간 중 지정학습 16시간 이상을 기준으로 관리합니다.","source":"「교육훈련시간 승진반영제도(상시학습) 운영지침」, Ⅱ. 교육훈련시간의 적용 등 2. 연간 교육훈련 기준시간, p.2","kw":["교육·배우리","지정학습은","얼마나","이수해야","하나요"]},{"id":"nfaq_112","cat":"교육·배우리","q":"필요 교육훈련시간은 어떻게 산출하나요?","a":"필요 교육훈련시간은 해당 계급 근무연수에 연간 교육훈련 기준시간을 곱하여 산출합니다. 계산 결과 소수점 이하는 버립니다. 근무연수는 “근무월 ÷ 12”로 계산하되, 근무월은 역에 따라 계산하고 남은 근무일수가 15일 이상이면 1월로 계산합니다. 이렇게 계산한 근무연수는 소수점 둘째자리에서 반올림하여 소수점 한 자리까지 계산합니다. 산출기준일은 승진심사일이 속한 달의 전전달 말일 현재입니다.\n\r\n계산 예시: 행정직군 연간 교육훈련 기준시간이 80시간이고, 산출기준일 현재 해당 계급 근무월이 18개월이면 근무연수는 18 ÷ 12 = 1.5년입니다. 이 경우 필요 교육훈련시간은 80시간 × 1.5년 = 120시간입니다.\r\n\r\n계산 예시: 해당 계급 근무월이 17개월이고 남은 근무일수가 15일 미만이라 1월로 산입되지 않는 경우에는 17 ÷ 12 = 1.416…이고, 소수점 둘째자리에서 반올림하여 1.4년으로 계산합니다. 이 경우 필요 교육훈련시간은 80시간 × 1.4년 = 112시간입니다.","source":"「교육훈련시간 승진반영제도(상시학습) 운영지침」, Ⅱ. 교육훈련시간의 적용 등 3. 교육훈련시간 산출, p.3","kw":["교육·배우리","필요","교육훈련시간은","어떻게","산출하나요"]},{"id":"nfaq_113","cat":"교육·배우리","q":"휴직·파견 기간도 필요 교육훈련시간 산출에 들어가나요?","a":"국가공무원법상 휴직기간, 일부 파견기간, 직위해제·정직 기간 등은 필요 교육훈련시간 산출에서 제외됩니다. 공무상 질병·부상으로 인한 장기병가와 출산휴가도 지침상 제외 대상에 포함됩니다.","source":"「교육훈련시간 승진반영제도(상시학습) 운영지침」, Ⅱ. 교육훈련시간 산출에서 제외되는 기간, p.4","kw":["교육·배우리","휴직","파견","기간도","필요","교육훈련시간","산출에","들어가나요"]},{"id":"nfaq_114","cat":"교육·배우리","q":"신규자 기본교육은 어느 직급의 교육훈련실적으로 보나요?","a":"신규채용후보자가 받은 기본교육훈련은 채용된 직급에서 이수한 교육훈련으로 봅니다.","source":"「교육훈련시간 승진반영제도(상시학습) 운영지침」, 신규채용 및 승진후보자의 기본교육 처리, p.4","kw":["교육·배우리","신규자","기본교육은","어느","직급의","교육훈련실적으로","보나요"]},{"id":"nfaq_115","cat":"교육·배우리","q":"배우리에서 자기개발계획은 어디서 수립하나요?","a":"자기개발계획은 배우리에서 수립합니다. 「2026 슬기로운 고용노동부 생활」 책자의 배우리 기초 활용법에 자기개발계획 수립 절차가 정리되어 있습니다. 실제 화면에서 계획을 수립한 뒤 학습실적, 승진필요 학습시간, 교육 기준시간을 함께 확인해야 합니다. 별도 공문으로 자기개발계획 수립 및 승인 절차가 안내된 경우에는 해당 공문도 함께 확인하시기 바랍니다.","source":"「2026 슬기로운 고용노동부 생활」, 제2장 배우리 기초 활용법, 자기개발계획 수립 p.70~81, 학습실적 조회 p.82~90","kw":["교육·배우리","배우리에서","자기개발계획은","어디서","수립하나요"]},{"id":"nfaq_116","cat":"교육·배우리","q":"배우리에서 교육 수강은 어떻게 하나요?","a":"배우리에서 수강신청, 수강신청결과 확인 및 취소, 수강하기 절차를 순서대로 진행합니다. 교육을 들었다고 끝나는 것이 아니라 수강결과와 학습실적 반영 여부까지 확인해야 합니다.","source":"「2026 슬기로운 고용노동부 생활」, 제2장 배우리 기초 활용법, 교육 수강 방법, p.91~99","kw":["교육·배우리","배우리에서","교육","수강은","어떻게","하나요"]},{"id":"nfaq_117","cat":"교육·배우리","q":"인재개발플랫폼은 어디서 가입하나요?","a":"외부망에서 인재개발플랫폼에 접속해 회원가입을 진행합니다. 회원가입 화면에서 회원유형을 선택하고, 휴대폰 인증 또는 GPKI 인증 중 하나로 본인인증을 한 뒤 약관동의와 정보입력 절차를 진행합니다. 국가직 공무원은 인재개발플랫폼 회원가입 후 나라배움터 ID 연계 또는 인증 여부도 확인해야 합니다.\n\r\n* 인재개발플랫폼은 정부·민간 학습 콘텐츠를 활용할 수 있는 학습 플랫폼입니다. 인재개발플랫폼에서 학습활동을 통해 포인트를 획득한 경우 일정 기준에 따라 승진에 필요한 교육훈련시간으로 인정될 수 있으므로 적극적으로 활용하시기 바랍니다.","source":"「2026 슬기로운 고용노동부 생활」, 인재개발플랫폼 가입 방법, p.103~116, 「공무원 인재개발 업무처리지침」, Ⅲ. 공무원 이러닝 운영, 5. 인재개발플랫폼의 설치·운영, p.13","kw":["교육·배우리","인재개발플랫폼은","어디서","가입하나요"]},{"id":"nfaq_118","cat":"교육·배우리","q":"학습조직이 무엇인가요?","a":"학습조직은 직무 관련 공통된 학습주제를 가진 직원들이 학습그룹을 구성하여 스스로 학습하는 비정형 학습모임입니다. 학습그룹 구성원들의 노하우 공유와 집단지성을 통해 현장의 문제를 스스로 개선하거나 해결하고, 소속기관 내 소통·협업을 강화하는 데 활용됩니다.\n\r\n구체적인 유형으로는 ① 멘토링, ② 문제해결, ③ 연구모임이 있습니다. 멘토링은 고용·노동 등 분야별 신규자의 조직적응 및 직무수행 역량 향상을 위한 유형이고, 문제해결은 고용·노동 등 분야별 직무수행 관련 지식·노하우 공유 및 현안 문제 해결을 위한 유형이며, 연구모임은 외부전문가 참여, 전문연구, 기관 또는 부처 간 협업, 적극행정 등에 특성화된 유형입니다.\r\n\r\n* 2026년 현재 전국 총 98개 학습조직이 운영 중입니다.","source":"「2026년도 학습조직 운영계획」, 「2026년 고용노동부 인재개발계획」","kw":["교육·배우리","학습조직이","무엇인가요"]},{"id":"nfaq_119","cat":"교육·배우리","q":"직무 관련 학습 비용을 지원해주는 제도가 있나요?","a":"고용노동부는 직원 스스로 개인별 자기 역량을 인식하고 자기주도 학습을 할 수 있도록 상시학습비 제도를 운영합니다. 지원분야는 직무, 어학, 리더십·역량 등이며, 지원대상은 고용노동부 전 직원입니다. 다만 휴직자와 파견자는 제외됩니다.\n\r\n지원내용은 1인당 연간 40만원 한도입니다. 지원수준은 직무 분야의 경우 소요비용의 70%, 직무 외 분야의 경우 소요비용의 50%입니다. 국외훈련 및 주재관 희망자 풀에 포함된 경우에는 어학 분야에 한해 80%까지 지원될 수 있습니다. 시험응시료는 소요비용의 50%를 지원합니다.\r\n\r\n* 직무는 고용노동부 관련 업무에 한하며, 수강료와 어학·자격증 등 시험응시료를 지원합니다.\r\n  ** 지원분야와 관련 없는 교육과정, 예를 들어 취미·여가활동 등에 해당하는 과정은 지원이 제한될 수 있습니다. 교육을 수료하지 못한 경우, 예를 들어 중도포기 또는 이수율 80% 미만 등도 지원이 제한될 수 있습니다.","source":"「2026년 고용노동부 인재개발계획」, 2. 직원 성장을 지원하는 자기개발제도 운영, 상시학습 지원체계 강화, p.16~17, 「자기주도 학습을 위한 직원역량 강화 계획」","kw":["교육·배우리","직무","관련","학습","비용을","지원해주는","제도가","있나요"]},{"id":"nfaq_120","cat":"교육·배우리","q":"특별승진이 무엇인가요?","a":"특별승진은 탁월한 업무성과, 적극행정, 명예퇴직 또는 사망 시 뚜렷한 공적이 있는 공무원 등을 대상으로 승진소요최저연수 단축 또는 상위 직급 결원 없이 우선 승진을 검토할 수 있는 제도입니다.\n\r\n* 고용노동부도 2026년 기준 6급에서 5급은 15명 내외, 7급에서 6급은 60명 내외 규모로 특별승진 계획을 진행 중입니다. 세부 인원과 일정은 해당 연도 특별승진 추진계획에 따라 달라질 수 있습니다.","source":"「2026 공직을 여행하는 신규공무원을 위한 안내서」, 승진임용, p.21~23, 2026년 특별승진 및 상반기 5급 승진 계획 알림","kw":["교육·배우리","특별승진이","무엇인가요"]},{"id":"nfaq_121","cat":"교육·배우리","q":"국외훈련 제도가 무엇인가요?","a":"공무원 국외훈련 제도는 국가적 현안 대응 및 선진 지식 습득을 위해 공무원을 해외 기관·대학 등에 파견하는 제도입니다. 인사혁신처 인재개발정보센터 및 부처 자체 선발을 통해 6개월 이상 장기훈련 또는 6개월 미만 단기훈련으로 구분해 진행합니다. 장기 국외훈련은 훈련비 지원과 함께 귀국 후 관련 분야 복무 의무가 부과됩니다.\n\r\n국외 학위과정의 경우 외국대학 석사과정 등은 훈련기간의 2배에 해당하는 기간 동안 훈련 분야와 관련된 직무에 복무해야 합니다. 국외 직무훈련도 외국정부·국제기구 등에서 수행하는 훈련으로 운영될 수 있으며, 훈련 중 보고서 제출과 귀국 후 성과평가 등 사후관리가 이루어집니다.","source":"「2026년 공무원 인재개발 종합계획」, 공무원 교육 체계, 참고1 공무원 인재개발 개요, p.48, 「공무원 인재개발 업무처리지침」, Ⅹ. 공무원 국외위탁교육훈련 운영, p.37~57","kw":["교육·배우리","국외훈련","제도가","무엇인가요"]},{"id":"nfaq_122","cat":"교육·배우리","q":"역량평가란 무엇인가요?","a":"역량평가는 6급 공무원이 중간관리자인 5급, 즉 사무관으로 승진하기 전 직무수행 역량을 검증하는 평가입니다. 서류함기법(In-Basket), 역할연기(Role-Playing), 구두발표(Oral Presentation) 등 모의 직무 상황을 통해 기획력, 문제해결 능력, 의사소통 및 조정·통합 능력, 리더십 등을 평가합니다.\n\r\n역량평가는 Pass/Fail 방식으로 운영되며, 5점 만점에 평균 2.5점 이상인 경우 Pass로 봅니다.","source":"인사혁신처 국가공무원 인재개발원 사이트(역량의 이해-5급 공무원 역량)","kw":["교육·배우리","역량평가란","무엇인가요"]},{"id":"nfaq_123","cat":"시스템","q":"처음 출근하면 누구에게 안내를 받나요?","a":"신규자는 출근 후 인사담당자를 찾아가 근무부서 등에 대한 안내를 받습니다. 보통 고용관리과가 있는 기관은 고용관리과에서 안내하고, 고용관리과가 없는 지청은 운영지원 업무를 수행하는 지역협력과 등에서 안내하는 경우가 많습니다. 다만 사전에 별도 안내가 있었으면 그 안내를 우선 확인합니다.","source":"「2026 공직을 여행하는 신규공무원을 위한 안내서」, 들어가며, p.4","kw":["시스템","처음","출근하면","누구에게","안내를","받나요"]},{"id":"nfaq_124","cat":"시스템","q":"업무망과 인터넷망은 어떻게 구분하나요?","a":"업무망은 내부 행정업무를 처리하는 망입니다. 공문 기안, 내부메일, 내부시스템 접속 등은 업무망에서 처리합니다. 인터넷망은 업무상 필요한 외부 사이트 접속에 사용합니다. 다만 네이버메일, 개인 Gmail 등 개인메일은 업무용으로 사용하지 않으며, 외부와 업무용 전자우편을 주고받아야 할 때에는 공직자통합메일 등 정해진 업무용 절차를 사용해야 합니다.","source":"「2026 공직을 여행하는 신규공무원을 위한 안내서」, 들어가며, p.5, 「2026 슬기로운 고용노동부 생활」, 공직자통합메일 가입 방법, p.311~315","kw":["시스템","업무망과","인터넷망은","어떻게","구분하나요"]},{"id":"nfaq_125","cat":"시스템","q":"행정망 접속에 필요한 GPKI는 어떻게 준비하나요?","a":"행정망 접속을 위해 공통적으로 공인인증서(GPKI) 파일이 필요합니다. 별도 신청서를 작성하여 공문으로 등록을 요청하고, 안내 문자에 따라 gpki.go.kr에서 인증서를 발급받습니다. 고용노동부 내부 절차는 「2026 슬기로운 고용노동부 생활」의 GPKI 발급·갱신 방법을 따릅니다.","source":"「2026 공직을 여행하는 신규공무원을 위한 안내서」, p.5, 「2026 슬기로운 고용노동부 생활」, GPKI 발급·갱신 방법, p.270~283","kw":["시스템","행정망","접속에","필요한","GPKI는","어떻게","준비하나요"]},{"id":"nfaq_126","cat":"시스템","q":"전화 응대는 어떻게 시작하는 것이 좋나요?","a":"민원인이나 유관기관 전화를 받을 때는 “안녕하세요. ○○○과 홍길동 주무관입니다.”처럼 인사, 소속부서, 성명, 직급 순으로 응대해야 합니다. 바로 답변하기 어려운 내용은 즉답하지 말고 사실관계를 확인한 뒤 정확히 답변해야 합니다.","source":"「2026 공직을 여행하는 신규공무원을 위한 안내서」, p.5","kw":["시스템","전화","응대는","어떻게","시작하는","것이","좋나요"]},{"id":"nfaq_127","cat":"시스템","q":"퇴근할 때 문서와 물품은 어떻게 해야 하나요?","a":"업무를 마치고 퇴근할 때에는 문서 및 물품을 잠금장치가 된 지정 서류함에 보관해야 합니다.","source":"「2026 공직을 여행하는 신규공무원을 위한 안내서」, p.6","kw":["시스템","퇴근할","문서와","물품은","어떻게","해야","하나요"]},{"id":"nfaq_128","cat":"시스템","q":"멘토에게 물어봐도 되나요?","a":"대부분의 부처는 신규직원 업무 적응을 지원하기 위해 멘토·멘티 제도를 운영합니다. 업무 전임자나 선배 공무원이 멘토로 지정되는 경우가 많으므로, 공직생활 중 궁금한 점은 멘토에게 확인하는 것이 안전합니다.","source":"「2026 공직을 여행하는 신규공무원을 위한 안내서」, p.6","kw":["시스템","멘토에게","물어봐도","되나요"]},{"id":"nfaq_129","cat":"시스템","q":"파일전송시스템은 어디에 쓰나요?","a":"파일전송시스템은 내부망과 외부망 사이에서 일반 전자파일을 송수신할 때 사용하는 시스템입니다. 외부망에서 받은 자료를 업무망으로 옮기거나, 업무망에서 작성한 일반 자료를 외부망으로 보내야 할 때 활용합니다.","source":"「2026 슬기로운 고용노동부 생활」, 파일전송시스템 사용 방법, p.298~302","kw":["시스템","파일전송시스템은","어디에","쓰나요"]},{"id":"nfaq_130","cat":"시스템","q":"G드라이브는 어떻게 활용하나요?","a":"고용노동부 내부 G드라이브는 자료 공유, 대용량 파일 전달, 권한 기반 공동 활용에 사용합니다. 자료를 업로드한 뒤 공유 대상자에게 권한을 부여하여 공유할 수 있고, 전보 등으로 본인이 생산·관리하던 업무자료를 옮길 때도 활용할 수 있습니다.","source":"「2026 슬기로운 고용노동부 생활」, G드라이브 활용 방법, p.303~310","kw":["시스템","G드라이브는","어떻게","활용하나요"]},{"id":"nfaq_131","cat":"시스템","q":"공직자통합메일은 어디서 가입하나요?","a":"공직자통합메일 가입 절차는 「2026 슬기로운 고용노동부 생활」 제8장 기타 매뉴얼 모음에 정리되어 있습니다. 가입 후 업무용 메일 사용 시 개인정보와 비공개 정보가 포함되지 않도록 주의해야 합니다.","source":"「2026 슬기로운 고용노동부 생활」, 공직자통합메일 가입 방법, p.311~315","kw":["시스템","공직자통합메일은","어디서","가입하나요"]},{"id":"nfaq_138","cat":"시스템","q":"업무시스템이 잘되다가 갑자기 안 열리면 먼저 무엇을 확인하나요?","a":"먼저 내부망·외부망 중 올바른 망에서 접속 중인지 확인하세요. 그다음 같은 사이트를 새로고침하고, 브라우저를 완전히 닫았다가 다시 실행해보세요. 그래도 화면이 깨지거나 로그인 오류가 반복되면 Chrome 또는 Edge에서 캐시와 쿠키를 삭제해봅니다. Chrome과 Edge 모두 Ctrl + Shift + Delete를 누르면 인터넷 사용 기록 삭제 화면을 열 수 있습니다. 다만 쿠키를 삭제하면 일부 사이트에서 로그아웃될 수 있으므로 “비밀번호”까지 삭제하지 않도록 체크 항목을 확인하세요. 기본 조치 후에도 안 되면 시스템명, 접속망, 브라우저, 오류 문구, 발생 시각, 시도한 조치를 정리해 전산 담당자에게 문의하세요.","kw":["시스템","업무시스템이","잘되다가","갑자기","안","열리면","먼저","무엇을","확인하나요","캐시","쿠키","오류","접속","브라우저"],"source":"Google Chrome 고객센터, Microsoft Edge 지원"},{"id":"nfaq_139","cat":"시스템","q":"Chrome에서 캐시와 쿠키는 어떻게 삭제하나요?","a":"Chrome에서 Ctrl + Shift + Delete를 누르면 인터넷 사용 기록 삭제 화면이 열립니다. 메뉴로 접근할 경우 우측 상단 점 세 개 → 인터넷 사용 기록 삭제 또는 설정 → 개인정보 및 보안 → 인터넷 사용 기록 삭제로 들어갑니다. 기간은 최근 오류 상황에 맞게 선택하고, 일반적으로 “쿠키 및 기타 사이트 데이터”, “캐시된 이미지 및 파일”을 선택합니다.","kw":["시스템","Chrome에서","캐시와","쿠키는","어떻게","삭제하나요","크롬","캐시","쿠키"],"source":"Google Chrome 고객센터"},{"id":"nfaq_140","cat":"시스템","q":"Edge에서 캐시와 쿠키는 어떻게 삭제하나요?","a":"Edge에서 Ctrl + Shift + Delete를 누르면 검색 데이터 지우기 화면이 열립니다. 주소창에 edge://settings/clearbrowserdata를 입력해도 됩니다. 메뉴로 접근할 경우 우측 상단 점 세 개 → 설정 → 개인정보, 검색 및 서비스 → 검색 데이터 지우기로 들어갑니다. “쿠키 및 기타 사이트 데이터”, “캐시된 이미지 및 파일”을 선택하여 삭제하고, 삭제 후에는 브라우저를 완전히 닫았다가 다시 실행해 접속을 확인합니다.","kw":["시스템","Edge에서","캐시와","쿠키는","어떻게","삭제하나요","엣지","캐시","쿠키"],"source":"Microsoft Edge 지원"},{"id":"nfaq_141","cat":"시스템","q":"파일을 다운로드했는데 어디에 저장됐는지 모르겠습니다.","a":"Windows PC에서는 내려받은 파일이 보통 “다운로드” 폴더에 저장됩니다. 파일 탐색기(윈도우키+E)를 열고 왼쪽의 다운로드 폴더를 확인하세요. Chrome과 Edge 모두 Ctrl + J를 누르면 다운로드 목록을 볼 수 있고, 해당 목록에서 파일 열기 또는 폴더 열기를 할 수 있습니다. 업무자료를 내려받은 경우에는 바탕화면이나 임의 폴더에 흩어두지 말고 업무별 폴더로 옮겨 정리하는 것이 좋습니다.","kw":["시스템","파일을","다운로드했는데","어디에","저장됐는지","모르겠습니다","다운로드","저장위치","파일"],"source":"Google Chrome 고객센터, Microsoft Edge 지원, Microsoft Windows 지원"},{"id":"nfaq_142","cat":"시스템","q":"Chrome과 Edge의 다운로드 저장 위치는 어떻게 바꾸나요?","a":"Chrome은 우측 상단 점 세 개 → 설정 → 다운로드에서 저장 위치를 변경할 수 있습니다. “다운로드 전에 각 파일의 저장 위치 확인” 옵션을 켜면 파일을 받을 때마다 저장 위치를 직접 선택할 수 있습니다. Edge는 우측 상단 점 세 개 → 설정 → 다운로드 → 위치 → 변경에서 저장 위치를 바꿀 수 있고, “각 다운로드 시 수행할 작업을 묻기” 옵션을 사용할 수 있습니다.","kw":["시스템","Chrome과","Edge의","다운로드","저장","위치는","어떻게","바꾸나요","저장위치","크롬","엣지"],"source":"Google Chrome 고객센터, Microsoft Edge 지원"},{"id":"nfaq_143","cat":"시스템","q":"업무시스템에서 팝업창이나 결재창이 안 열리면 어떻게 하나요?","a":"먼저 브라우저의 팝업 차단 여부를 확인하세요. 결재창, 출력창, 첨부파일창은 새 창으로 열리는 경우가 많아 팝업 차단이 켜져 있으면 실행되지 않을 수 있습니다. 주소창 오른쪽에 팝업 차단 표시가 있는지 확인하고, 해당 업무시스템 사이트는 팝업 허용으로 설정해보세요. 그래도 안 되면 다른 브라우저에서 접속해보고, 같은 오류가 반복되면 시스템명, 화면 캡처, 팝업 차단 여부, 사용 브라우저를 정리해 전산 담당자에게 문의하세요.","kw":["시스템","업무시스템에서","팝업창이나","결재창이","안","열리면","어떻게","하나요","팝업","결재창","출력창","첨부파일창"],"source":"Microsoft Edge 지원, Google Chrome 고객센터"},{"id":"nfaq_144","cat":"시스템","q":"첨부파일 업로드가 안 되면 무엇을 확인해야 하나요?","a":"파일명이 너무 길거나 특수문자가 많은지, 파일 경로가 너무 깊은지, 파일이 열려 있는 상태인지 먼저 확인하세요. 예를 들어 바탕화면이나 짧은 경로의 폴더로 파일을 옮긴 뒤 다시 업로드해보는 것이 좋습니다. 파일 용량 제한이 있는 시스템도 있으므로 용량도 확인하세요. 한글 파일명이나 특수문자 때문에 오류가 나는 경우에는 파일명을 날짜_내용_부서명처럼 단순하게 바꿔보세요. 그래도 안 되면 오류 문구와 파일명, 파일 형식, 용량, 사용 시스템을 정리해 전산 담당자에게 문의하세요.","kw":["시스템","첨부파일","업로드가","안","되면","무엇을","확인해야","하나요","업로드","파일명","용량"]},{"id":"nfaq_145","cat":"시스템","q":"모니터 화면이 안 나오면 무엇부터 확인하나요?","a":"전산 담당자에게 바로 연락하기 전에 가장 기본적인 것부터 확인하세요. 멀티탭 전원이 켜져 있는지, 모니터 전원선이 꽂혀 있는지, 모니터 전원 버튼을 눌렀는지, 본체 전원이 켜져 있는지 확인합니다. 그다음 모니터와 본체를 연결하는 HDMI, DP, RGB 케이블이 빠져 있지 않은지 보고, 모니터 입력 Source가 실제 연결 방식(HDMI, DP, RGB 등)과 맞는지, PC를 켰을 때 삐삑 소리(램 메모리 카드 인식 오류)가 나며 무한 재부팅되는지 확인하세요. 듀얼 모니터라면 Windows + P를 눌러 복제, 확장, PC 화면만, 두 번째 화면만 설정이 잘못되어 있지 않은지도 확인합니다. 기본 점검 후에도 안 되면 어떤 모니터가 안 나오는지, 전원 불빛은 켜지는지, 케이블 종류, 본체 전원 상태를 정리해 전산 담당자에게 문의하세요.","kw":["시스템","모니터","화면이","안","나오면","무엇부터","확인하나요","화면","HDMI","DP","RGB","Windows P"],"source":"Microsoft Windows 지원"},{"id":"nfaq_146","cat":"시스템","q":"듀얼 모니터가 한쪽만 나오면 어떻게 하나요?","a":"먼저 케이블이 빠져 있지 않은지, 모니터 전원이 켜져 있는지, 입력 Source(HDMI, DP, RGB 등)가 맞는지 확인하세요. 그다음 Windows + P를 눌러 “확장” 또는 필요한 표시 방식이 선택되어 있는지 확인합니다. 화면이 엉뚱한 방향으로 넘어가거나 마우스가 반대로 움직이면 Windows 설정 → 시스템 → 디스플레이에서 모니터 배치 순서를 조정할 수 있습니다. 임의로 케이블을 계속 뽑았다 꽂으면 더 혼란스러울 수 있으므로, 기본 확인 후에도 안 되면 모니터 번호, 연결 케이블 종류, 증상을 전산 담당자에게 문의하세요.","kw":["시스템","듀얼","모니터가","한쪽만","나오면","어떻게","하나요","듀얼모니터","확장","디스플레이"],"source":"Microsoft Windows 지원"},{"id":"nfaq_147","cat":"시스템","q":"데스크톱 본체가 안 켜지면 무엇을 확인해야 하나요?","a":"먼저 멀티탭 전원이 켜져 있는지, 멀티탭 코드가 벽면 콘센트에 꽂혀 있는지, 본체 전원 케이블이 빠져 있지 않은지 확인하세요. 본체 뒤쪽 전원 스위치가 있는 모델이라면 스위치가 켜져 있는지도 확인합니다. 전원 버튼을 눌렀을 때 불빛이나 팬 소리가 전혀 없으면 전원 공급 문제일 수 있습니다. 반대로 본체는 켜지는데 화면만 안 나오면 모니터나 케이블 문제일 수 있으므로 구분해서 봐야 합니다. 기본 확인(선 교체 포함) 후에도 안 되면 본체 전원등, 팬 소리, 모니터 상태, 멀티탭 상태를 정리해 전산 담당자에게 문의하세요.\n * 삐빅 소리가 나면서 무한 재부팅이 될 경우 램 메모리 카드 인식 오류일 수 있으니, 전산 담당자에게 문의하세요.","kw":["시스템","데스크톱","본체가","안","켜지면","무엇을","확인해야","하나요","본체","전원","램","메모리"]},{"id":"nfaq_148","cat":"시스템","q":"컴퓨터는 켜졌는데 화면이 멈추거나 반응이 없으면 어떻게 하나요?","a":"먼저 잠시 기다려보고, 키보드의 Caps Lock 또는 Num Lock 불빛이 반응하는지 확인하세요. 마우스만 안 움직이는지, 키보드도 안 먹는지 구분해야 합니다. 저장하지 않은 문서가 있다면 무리하게 전원을 끄기 전에 주변 선임이나 전산 담당자에게 먼저 확인하는 것이 안전합니다. 완전히 멈춘 상태가 오래 지속되고 업무 진행이 불가능하면 전산 담당자에게 증상을 설명하고 조치 지시를 받으세요. “화면 멈춤”, “마우스만 안 됨”, “키보드도 안 됨”, “어떤 프로그램 사용 중 발생했는지”를 구체적으로 말해야 합니다.","kw":["시스템","컴퓨터는","켜졌는데","화면이","멈추거나","반응이","없으면","어떻게","하나요","컴퓨터","멈춤","키보드","마우스"]},{"id":"nfaq_149","cat":"시스템","q":"프린터 출력이 안 되면 무엇부터 확인하나요?","a":"먼저 멀티탭 전원 온오프 여부, 선 연결 확인 후 올바른 프린터를 선택했는지 확인하세요. 같은 사무실에 여러 대의 프린터가 있으면 다른 층이나 다른 부서 프린터로 출력되는 경우가 많습니다. 그다음 프린터 전원, 용지, 토너, 에러 표시, 네트워크 연결 상태를 확인합니다. Windows에서는 설정 → Bluetooth 및 장치 → 프린터 및 스캐너에서 해당 프린터를 선택해 출력 대기열을 확인할 수 있습니다. 출력 대기열에 문서가 쌓여 있거나 오류 상태이면 무작정 여러 번 출력하지 말고, 대기열 상태와 오류 문구를 확인한 뒤 전산 담당자에게 문의하세요.","kw":["시스템","프린터","출력이","안","되면","무엇부터","확인하나요","출력","대기열","토너"],"source":"Microsoft Windows 지원"},{"id":"nfaq_150","cat":"시스템","q":"출력했는데 문서가 프린터에서 안 나오고 대기 중이면 어떻게 하나요?","a":"출력 대기열에 문서가 걸려 있을 수 있습니다. Windows 설정 → Bluetooth 및 장치 → 프린터 및 스캐너 → 해당 프린터 → 출력 대기열 열기로 들어가 대기 중인 문서를 확인하세요. 본인 문서가 반복 출력 대기 중이면 중복 출력이 될 수 있으니 같은 문서를 계속 다시 보내지 마세요. 프린터 자체에 용지 부족, 용지 걸림, 토너 부족, 오프라인 표시가 있는지도 확인합니다. 본인 권한으로 해결이 어렵거나 여러 직원의 출력이 함께 멈춘 경우에는 전산 담당자에게 프린터명, 오류 문구, 대기열 상태를 알려주세요.","kw":["시스템","출력했는데","문서가","프린터에서","안","나오고","대기","중이면","어떻게","하나요","프린터","대기중","대기열","출력"],"source":"Microsoft Windows 지원"},{"id":"nfaq_151","cat":"시스템","q":"복합기에서 스캔한 파일이 안 보이면 어떻게 하나요?","a":"먼저 복합기에서 스캔 대상자를 본인으로 제대로 선택했는지 확인하세요. 스캔 파일이 개인 스캔박스(공유폴더, 메일 등은 금지)로 들어가는데, 스캔박스 프로그램, 접속방법의 경우 기관마다 다를 수 있습니다. 파일명이 자동으로 생성되는 경우 날짜나 시간 기준으로 찾아야 할 수 있습니다. 스캔박스 비밀번호가 필요한 기관은 비밀번호도 확인하세요. 그래도 파일이 보이지 않으면 복합기명, 스캔한 시각, 선택한 수신자, 저장 방식, 오류 메시지를 정리해 전산 담당자에게 문의하세요.","kw":["시스템","복합기에서","스캔한","파일이","안","보이면","어떻게","하나요","복합기","스캔","스캔박스"]},{"id":"nfaq_152","cat":"시스템","q":"복합기에서 복사나 스캔은 되는데 인쇄만 안 되면 어떻게 하나요?","a":"복사나 스캔이 되는데 PC 출력만 안 되면 복합기 자체 고장보다는 PC와 프린터 연결, 프린터 드라이버, 출력 대기열, 네트워크 문제일 가능성이 큽니다. 먼저 프린터명을 정확히 선택했는지, 출력 대기열에 문서가 멈춰 있는지, 프린터가 오프라인으로 표시되는지 확인하세요. 같은 복합기에 다른 직원은 출력이 되는지도 확인하면 원인 구분에 도움이 됩니다. 내 PC만 안 되면 내 PC 설정 문제일 수 있고, 모두 안 되면 복합기나 네트워크 문제일 수 있습니다. 이 구분을 전산 담당자에게 알려주세요.","kw":["시스템","복합기에서","복사나","스캔은","되는데","인쇄만","안","되면","어떻게","하나요","복합기","인쇄","프린터","드라이버"],"source":"Microsoft Windows 지원"},{"id":"nfaq_153","cat":"시스템","q":"전산 담당자에게 문의할 때 무엇을 같이 알려야 하나요?","a":"“안 됩니다”만 말하면 원인 파악이 어렵습니다. 최소한 시스템명, 접속망, 사용 브라우저, PC 번호나 자리 위치, 발생 시각, 오류 문구, 화면 캡처, 본인이 이미 해본 조치를 함께 알려주세요. 프린터 문제라면 프린터명과 출력 대기열 상태, 모니터 문제라면 전원등과 케이블 종류, 데스크톱 문제라면 본체 전원등과 팬 소리 여부를 말해야 합니다. 이렇게 문의하면 전산 담당자가 같은 질문을 반복하지 않아도 되어 조치가 빨라집니다.","kw":["시스템","전산","담당자에게","문의할","때","무엇을","같이","알려야","하나요","전산담당자","문의","오류","화면캡처"]},{"id":"nfaq_132","cat":"복지·생활","q":"맞춤형 복지제도는 무엇인가요?","a":"맞춤형 복지제도는 사전에 설계되어 제공되는 복지혜택 중 공무원이 본인의 선호와 필요에 따라 개별적으로 부여된 복지점수를 사용하여 자신에게 적합한 복지혜택을 선택하는 제도입니다.","source":"「공무원 후생복지에 관한 규정」 제2조 제1호, 「2026 공직을 여행하는 신규공무원을 위한 안내서」, p.41","kw":["복지·생활","맞춤형","복지제도는","무엇인가요"]},{"id":"nfaq_133","cat":"복지·생활","q":"맞춤형 복지제도는 누구에게 적용되나요?","a":"공무원 후생복지에 관한 규정상 후생복지제도는 행정부 소속 국가공무원에게 적용됩니다. 다만 휴직 중인 공무원, 시보 임용기간 중인 공무원, 국외파견 중인 공무원, 재외공관 근무 공무원 등은 인사혁신처장이 정하는 범위에서 일부 적용이 배제되거나 제한될 수 있습니다.","source":"「공무원 후생복지에 관한 규정」 제3조","kw":["복지·생활","맞춤형","복지제도는","누구에게","적용되나요"]},{"id":"nfaq_134","cat":"복지·생활","q":"복지포인트는 어디서 확인하나요?","a":"외부망에서 맞춤형 복지포털 사이트에 접속한 뒤 가입하여 확인할 수 있습니다. 제도 정의는 공무원 후생복지 규정, 실제 사용 절차는 해당 연도 내부 안내와 맞춤형 복지포털 화면을 함께 확인해야 합니다.","source":"「공무원 후생복지에 관한 규정」 제2조·제5조, 「2026 슬기로운 고용노동부 생활」, 맞춤형 복지 제도, p.259~261","kw":["복지·생활","복지포인트는","어디서","확인하나요"]},{"id":"nfaq_135","cat":"복지·생활","q":"공무원 단체보험은 어디에서 확인하나요?","a":"고용노동부 공무원 단체보험은 「2026 슬기로운 고용노동부 생활」 복지 제도 장에서 확인합니다. 또한 다우리에 접속하여 알림 → 알림게시판 → 복지탐구생활에서 구체적인 내용을 확인할 수 있습니다.","source":"「2026 슬기로운 고용노동부 생활」, 공무원 단체보험, p.257~258","kw":["복지·생활","공무원","단체보험은","어디에서","확인하나요"]},{"id":"nfaq_136","cat":"복지·생활","q":"건강검진비 지원은 어디에서 확인하나요?","a":"고용노동부 건강검진비 지원은 「2026 슬기로운 고용노동부 생활」 복지 제도 장에서 확인합니다. 또한 다우리에 접속하여 알림 → 알림게시판 → 공제회 또는 건강·안전 게시판에서 구체적인 내용을 확인할 수 있습니다. 건강검진 공가 여부와 검진비 지원은 근거와 담당이 다르므로 구분해서 봐야 합니다.","source":"「2026 슬기로운 고용노동부 생활」, 건강검진비 p.251, 건강관리 지원 p.252~253, 「국가공무원 복무·징계 관련 예규」, 공가 사유 p.181","kw":["복지·생활","건강검진비","지원은","어디에서","확인하나요"]},{"id":"nfaq_137","cat":"복지·생활","q":"트라우마 등 전문상담 프로그램은 어디에서 확인하나요?","a":"고용노동부 트라우마 등 전문상담 프로그램은 「2026 슬기로운 고용노동부 생활」 복지 제도 장에서 확인합니다. 또한 다우리에 접속하여 알림 → 알림게시판 → 건강·안전 게시판에서 구체적인 내용을 확인할 수 있습니다. 심리안정휴가와 상담 프로그램은 서로 다른 제도이므로 휴가 신청 여부는 복무예규를 별도로 확인해야 합니다.","source":"「2026 슬기로운 고용노동부 생활」 트라우마 등 전문상담 프로그램 p.254 / EAP p.255, 「국가공무원 복무·징계 관련 예규」 심리안정휴가 p.200~202","kw":["복지·생활","트라우마","전문상담","프로그램은","어디에서","확인하나요"]},{"id":"nfaq_154","cat":"복지·생활","q":"점심시간은 항상 12시부터 13시인가요?","a":"일반적인 점심시간은 12시부터 13시입니다. 다만 민원창구, 교대근무, 당번제, 기관 운영 방식에 따라 실제 식사 시간이 달라질 수 있습니다. 신규자는 첫 주에 우리 부서가 점심시간 전화를 어떻게 처리하는지, 교대식사를 하는지, 점심시간에도 민원응대 당번이 있는지 먼저 확인하는 것이 좋습니다.","kw":["복지·생활","점심시간은","항상","12시부터","13시인가요","점심시간","교대근무","당번제"],"source":"국가공무원 복무규정"},{"id":"nfaq_155","cat":"복지·생활","q":"구내식당이 있는지와 식대 결제 방식은 어떻게 확인하나요?","a":"청사마다 구내식당 유무와 운영 방식이 다릅니다. 첫 주에는 구내식당이 있는지, 직원 이용이 가능한지, 배식 마감 시간이 언제인지, 개인카드 결제인지, 식권 구매인지, 장부 기입인지, 급여 사전공제인지 확인하세요. 구내식당이 없거나 부서가 외부 식당을 주로 이용하는 경우에는 자주 가는 식당, 예약 필요 여부, 각자 계산 여부도 함께 확인하는 것이 좋습니다.","kw":["복지·생활","구내식당이","있는지와","식대","결제","방식은","어떻게","확인하나요","구내식당","점심"]},{"id":"nfaq_156","cat":"복지·생활","q":"야근할 때 저녁 매식은 어떻게 이용하나요?","a":"야근이 예정되어 있다면 저녁 매식이 가능한 지정식당, 이용 가능 시간, 마감 시간, 포장 가능 여부, 결제 방식을 미리 확인하세요. 개인카드 결제 후 정산인지, 장부 기입인지, 식권 방식인지, 지정식당 선결제 방식인지 기관별로 다를 수 있습니다. 저녁을 먹었다고 해서 무조건 매식비 대상이 되는 것은 아니므로 초과근무 신청시간, 실제 퇴근시간, 출퇴근 인증 여부를 같이 확인해야 합니다.","kw":["복지·생활","야근할","때","저녁","매식은","어떻게","이용하나요","야근","매식","매식비"]},{"id":"nfaq_157","cat":"복지·생활","q":"저녁 매식비는 얼마이고 언제 받을 수 있나요?","a":"저녁 매식비는 보통 1식 9,000원 범위에서 운영됩니다. 다만 실제 사용 가능 여부, 결제 방식, 지정식당 운영 여부는 기관별 기준에 따릅니다. 또한 우리 기관 기준상 초과근무 2시간 이상 등 매식 대상 요건을 충족해야 할 수 있으므로, 야근 전에 서무 담당자에게 현행 단가와 사용 조건을 확인하세요.","kw":["복지·생활","저녁","매식비는","얼마이고","언제","받을","수","있나요","매식비","9000원","초과근무"],"source":"2026 공무원보수 등의 업무지침, 국가공무원 복무규정"},{"id":"nfaq_158","cat":"복지·생활","q":"근무지외 출장일에 야근하면 저녁 매식비도 받을 수 있나요?","a":"근무지외 출장으로 여비의 식비를 지급받는 경우에는 저녁에 초과근무를 하더라도 같은 식사에 대해 매식비가 별도로 지급되지 않을 수 있습니다. 출장일에 야근이 예상되면 출장여비 식비 지급 여부와 초과근무 매식비 대상 여부를 반드시 서무 담당자에게 확인하세요. 출장과 초과근무가 함께 있는 날은 중복 지급 여부를 먼저 확인하는 것이 안전합니다.","kw":["복지·생활","근무지외","출장일에","야근하면","저녁","매식비도","받을","수","있나요","출장","매식비","식비"],"source":"2026 공무원보수 등의 업무지침, 국가공무원 복무규정"},{"id":"nfaq_159","cat":"복지·생활","q":"아침 일찍 출근하거나 늦게 퇴근할 때 출입문은 어떻게 확인하나요?","a":"청사 출입문은 정문, 후문, 지하주차장, 연결통로별로 개방·폐쇄 시간이 다를 수 있습니다. 아침 일찍 출근하거나 저녁 늦게 퇴근할 일이 있다면 청사 출입문이 언제 열리고 닫히는지, 어떤 문을 이용해야 하는지 미리 확인하세요. 특히 야간·주말에는 평일과 출입 절차가 다를 수 있으므로 비밀번호, 열쇠, 지문, 공무원증 인증 등 사전 출입권한이 필요한지도 확인해야 합니다.","kw":["복지·생활","아침","일찍","출근하거나","늦게","퇴근할","때","출입문은","어떻게","확인하나요","출입문","조기출근","야간","주말"]},{"id":"nfaq_160","cat":"복지·생활","q":"공무원증이나 출입카드를 잃어버리면 어떻게 하나요?","a":"공무원증이나 출입카드 분실은 단순 물건 분실이 아니라 보안 문제로 이어질 수 있습니다. 분실 즉시 고용관리과 보안 담당자 또는 신분증 담당자에게 신고하고 필요한 조치를 받으세요. 고용관리과가 없는 지청의 경우 운영지원 업무를 수행하는 지역협력과 담당자에게 확인하세요. 임의로 며칠 더 찾아보고 신고를 미루는 것은 적절하지 않습니다.","kw":["복지·생활","공무원증이나","출입카드를","잃어버리면","어떻게","하나요","공무원증","출입카드","분실"],"source":"국가공무원 복무규정"},{"id":"nfaq_161","cat":"복지·생활","q":"자가용으로 출근하려면 무엇을 확인해야 하나요?","a":"직원 주차 가능 여부, 차량등록 필요 여부, 민원인 주차장과 직원 주차장 구분, 주차권 처리 방식부터 확인하세요. 청사별로 주차 공간과 운영 방식이 다르며, 신규자가 민원인 주차장이나 지정 외 구역을 이용하면 문제가 될 수 있습니다. 첫 출근 전 또는 첫 주에 서무 담당자에게 차량등록 절차와 주차 가능 구역을 확인하는 것이 좋습니다.","kw":["복지·생활","자가용으로","출근하려면","무엇을","확인해야","하나요","자가용","주차","차량등록"]},{"id":"nfaq_162","cat":"복지·생활","q":"청사 안에서 자주 쓰는 공간은 무엇을 미리 봐두면 좋나요?","a":"탕비실, 휴게공간, 화장실, 회의실, 문서고, 우산 보관 장소, 비상약 위치, 소화기, AED, 비상구 위치는 첫 주 안에 확인해두는 것이 좋습니다. 위치를 알아두면 매번 주변 직원에게 묻지 않아도 되고, 비상상황에도 당황을 줄일 수 있습니다. 특히 민원부서나 외부 방문이 많은 부서는 회의실과 민원인 동선도 함께 확인하세요.","kw":["복지·생활","청사","안에서","자주","쓰는","공간은","무엇을","미리","봐두면","좋나요","탕비실","회의실","비상구","AED"]},{"id":"nfaq_173","cat":"시스템","q":"다우리 포털 비밀번호가 어떻게 되나요?","a":"초기 비밀번호는 hello + 본인 생년월일 6자리입니다. 예를 들어 생년월일이 1990년 1월 1일이면 hello900101처럼 입력합니다.\n\n다만, 다우리 포털 접속 보안 강화 조치에 따라 로그인 후 즉시 개인설정에 접속하여 GPKI를 등록해야 합니다. 등록 후에는 비밀번호 대신 GPKI 또는 모바일 공무원증으로 로그인해야 합니다.","kw":["시스템","다우리","포털","비밀번호","초기비밀번호","GPKI","모바일공무원증","hello"]}];
